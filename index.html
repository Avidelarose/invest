<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InvestPro | iOS Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Подключаем Merriweather для ридера, остальное на системных шрифтах -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ios: { bg: '#000000', card: '#1C1C1E', gray: '#8E8E93', sep: '#38383A', blue: '#0A84FF', green: '#30D158', red: '#FF453A' },
                        accent: '#0A84FF'
                    },
                    fontFamily: { 
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'], 
                        serif: ['Merriweather', 'serif'] 
                    }
                }
            }
        }
    </script>
    
    <style>
        /* iOS SPECIFIC STYLES */
        body { background-color: #000; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        
        /* Safe Area Insets for iPhone Notch etc */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* HORIZONTAL TIKTOK FEED */
        .feed-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            height: calc(100vh - 84px); /* Вычет таббара */
            scroll-padding-left: 2rem;
        }
        
        .feed-card {
            flex: 0 0 90vw; /* На мобильном 90% ширины */
            max-width: 400px; /* Ограничение на ПК */
            height: 100%;
            scroll-snap-align: center;
            margin-right: 1rem;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .feed-scroll { justify-content: flex-start; padding: 2rem; height: calc(100vh - 100px); }
            .feed-card { flex: 0 0 380px; margin-right: 1.5rem; }
        }

        /* Скрытие скроллбара */
        .feed-scroll::-webkit-scrollbar { display: none; }
        .feed-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* GLASSMORPHISM TAB BAR */
        .tab-bar {
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            background-color: rgba(28, 28, 30, 0.85);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        /* READER STYLES */
        .reader-overlay { position: fixed; inset: 0; z-index: 100; background: #000; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .reader-overlay.active { opacity: 1; pointer-events: auto; }
        .reader-paper.light { background: #F2F2F7; color: #1C1C1E; }
        .reader-paper.dark { background: #1C1C1E; color: #F2F2F7; }
        
        .prose-ios p { margin-bottom: 1.6em; font-size: 1.1rem; line-height: 1.7; }
        .prose-ios h2 { font-weight: 800; font-size: 1.5rem; margin-top: 2em; margin-bottom: 0.8em; letter-spacing: -0.02em; }
        .prose-ios blockquote { border-left: 3px solid #0A84FF; padding-left: 1em; margin: 1.5em 0; font-style: italic; opacity: 0.8; }

        /* ANIMATIONS */
        @keyframes likePop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .like-animate { animation: likePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(50,50,50,0.9); color: white; padding: 1.5rem; border-radius: 16px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.2s; text-align: center; backdrop-filter: blur(10px); }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body class="text-gray-100 antialiased selection:bg-accent selection:text-white">

    <!-- TOAST -->
    <div id="toast"><i class="fas fa-check-circle text-3xl mb-2 text-green-500"></i><br><span id="toast-msg">Готово</span></div>

    <!-- HEADER (Minimalist iOS Style) -->
    <header class="fixed top-0 w-full z-40 safe-top bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="h-14 flex items-center justify-between px-4">
            <div class="font-bold text-xl tracking-tight">Invest<span class="text-accent">Pro</span></div>
            <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-ios-card flex items-center justify-center text-ios-gray"><i class="fas fa-cog text-xs"></i></button>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="pt-[calc(env(safe-area-inset-top)+3.5rem)] pb-24 h-screen overflow-hidden relative">
        
        <!-- VIEW: FEED (Horizontal Swipe) -->
        <section id="view-feed" class="absolute inset-0 pt-[calc(env(safe-area-inset-top)+3.5rem)] pb-20">
            <div id="feed-container" class="feed-scroll pl-4 md:pl-8">
                <!-- Cards injected by JS -->
            </div>
            <div id="feed-loader" class="absolute right-4 top-1/2 -translate-y-1/2 text-ios-gray text-sm hidden"><i class="fas fa-circle-notch fa-spin mr-2"></i></div>
        </section>

        <!-- VIEW: IDEAS (Vertical List) -->
        <section id="view-ideas" class="absolute inset-0 pt-[calc(env(safe-area-inset-top)+3.5rem)] pb-24 overflow-y-auto px-4 hidden">
            <h2 class="text-3xl font-bold mb-6 mt-2">Мнения</h2>
            <div id="ideas-list" class="space-y-4"></div>
        </section>

        <!-- VIEW: ADMIN -->
        <section id="view-admin" class="absolute inset-0 pt-[calc(env(safe-area-inset-top)+3.5rem)] pb-24 overflow-y-auto px-4 bg-black hidden z-50">
            <div class="max-w-lg mx-auto space-y-6 mt-4">
                <h2 class="text-2xl font-bold">Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none focus:border-accent" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent py-3 rounded-xl font-bold text-white">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-4">
                    <select id="new-tag" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none"><option value="news">Новость</option><option value="idea">Мнение</option></select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none">
                    <textarea id="new-body" rows="6" placeholder="Текст..." class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-white">Опубликовать</button>
                </div>
            </div>
        </section>

    </main>

    <!-- iOS TAB BAR -->
    <nav class="fixed bottom-0 w-full tab-bar safe-bottom z-50 flex justify-around items-center h-[84px] md:hidden">
        <button onclick="app.nav('feed')" class="flex flex-col items-center gap-1 w-full py-2 text-accent transition" id="tab-feed">
            <i class="fas fa-newspaper text-xl"></i>
            <span class="text-[10px] font-medium">Лента</span>
        </button>
        <button onclick="app.nav('ideas')" class="flex flex-col items-center gap-1 w-full py-2 text-ios-gray transition" id="tab-ideas">
            <i class="fas fa-lightbulb text-xl"></i>
            <span class="text-[10px] font-medium">Мнения</span>
        </button>
    </nav>

    <!-- DESKTOP NAV (Visible only on PC) -->
    <nav class="hidden md:flex fixed bottom-8 left-1/2 -translate-x-1/2 bg-ios-card/90 backdrop-blur-xl border border-white/10 rounded-full px-6 py-3 gap-8 z-50 shadow-2xl">
        <button onclick="app.nav('feed')" class="text-sm font-bold hover:text-accent transition" id="desk-feed">Лента</button>
        <button onclick="app.nav('ideas')" class="text-sm font-bold text-ios-gray hover:text-accent transition" id="desk-ideas">Мнения</button>
    </nav>

    <!-- READER MODAL -->
    <div id="reader-modal" class="reader-overlay">
        <div id="reader-paper" class="reader-paper light min-h-screen pb-20">
            <div class="sticky top-0 z-10 flex justify-between items-center px-4 py-3 bg-inherit/90 backdrop-blur border-b border-black/5">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-accent font-medium"><i class="fas fa-chevron-left"></i> Назад</button>
                <button onclick="app.toggleReaderTheme()" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center"><i id="theme-icon" class="fas fa-moon text-xs"></i></button>
            </div>
            <article id="reader-content" class="prose-ios max-w-2xl mx-auto px-6 py-8"></article>
            
            <!-- Actions & Comments -->
            <div class="max-w-2xl mx-auto px-6 mt-8 border-t border-black/10 dark:border-white/10 pt-8 font-sans">
                <div class="flex gap-3 mb-8">
                    <button id="reader-like-btn" onclick="app.handleReaderLike()" class="flex-1 py-3 rounded-xl font-bold border border-black/10 dark:border-white/10 flex items-center justify-center gap-2 transition active:scale-95"><i class="far fa-heart"></i> <span id="reader-like-count">0</span></button>
                    <button onclick="app.handleReaderShare()" class="flex-1 py-3 rounded-xl font-bold bg-accent text-white flex items-center justify-center gap-2 transition active:scale-95"><i class="fas fa-share-alt"></i> Поделиться</button>
                </div>
                
                <a id="reader-source-link" href="#" target="_blank" class="block w-full py-3 mb-8 rounded-xl font-bold text-center bg-black text-white dark:bg-white dark:text-black no-underline hidden">Перейти к источнику</a>

                <h3 class="text-lg font-bold mb-4">Комментарии (<span id="comments-count">0</span>)</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="comment-nick" class="bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-sm w-1/3 outline-none" placeholder="Ник">
                    <input type="text" id="comment-input" class="flex-1 bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-sm outline-none" placeholder="Комментарий...">
                    <button onclick="app.postComment()" class="bg-accent text-white w-10 h-10 rounded-lg flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
                </div>
                <div id="comments-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { 
        news: [], posts: [], feedPage: 0, feedLoading: false, feedHasMore: true, allFetchedNews: [],
        readerTheme: localStorage.getItem('ip_theme') || 'light',
        likes: JSON.parse(localStorage.getItem('ip_likes_ios') || '{}'),
        comments: JSON.parse(localStorage.getItem('ip_comments_ios') || '{}'),
        userNick: localStorage.getItem('ip_nick') || '',
        currentItem: null, rssSources: [], sourceIndex: 0
    },

    init() {
        this.generateRSSSources();
        this.seedInitialNews();
        
        const savedPosts = localStorage.getItem('ip_posts_ios');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку", body: "Энергетический кризис только начинается.", full: "<p>Многие боятся рецессии, но я вижу точку входа.</p><h2>Причины</h2><p>Дефицит инвестиций в добычу.</p>", tag: "Мнение", date: "2ч назад", isPost: true, sourceUrl: "#" }
        ];

        if(this.data.userNick) document.getElementById('comment-nick').value = this.data.userNick;
        this.rebuildIndex();
        this.renderIdeas();
        
        // Рендерим первую партию ленты
        this.renderFeedChunk(this.data.allFetchedNews.slice(0, 5));
        this.data.feedPage = 1;

        // Слушатель скролла для бесконечной ленты (горизонтальный!)
        const feed = document.getElementById('feed-container');
        feed.addEventListener('scroll', () => {
            if (this.data.currentView !== 'feed') return;
            const { scrollLeft, scrollWidth, clientWidth } = feed;
            if (scrollLeft + clientWidth >= scrollWidth - 300 && !this.data.feedLoading && this.data.feedHasMore) {
                this.loadMoreFeed();
            }
        });

        // Прелоадер не нужен, т.к. старт мгновенный
    },

    seedInitialNews() {
        this.data.news = [
            { id: 's1', title: "Сбербанк: рекордная прибыль", body: "Чистая прибыль превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность.</p><h2>Детали</h2><p>Маржа выросла до 5.8%.</p>", tag: "Акции", source: "РБК", date: "1ч", sourceUrl: "https://rbc.ru" },
            { id: 's2', title: "Биткоин > $70,000", body: "Крипта обновила максимум.", full: "<p>Рынок ликует на фоне ETF.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч", sourceUrl: "https://bloomberg.com" },
            { id: 's3', title: "ЦБ держит ставку", body: "Жесткая риторика сохраняется.", full: "<p>Набиуллина предупредила о рисках.</p>", tag: "Макро", source: "Интерфакс", date: "5ч", sourceUrl: "https://interfax.ru" },
            { id: 's4', title: "Газпром: новый НПЗ", body: "Инвестиции 300 млрд.", full: "<p>Увеличение переработки.</p>", tag: "Сырье", source: "Ведомости", date: "6ч", sourceUrl: "https://vedomosti.ru" },
            { id: 's5', title: "Яндекс GPT 5", body: "Лучше чем GPT-4?", full: "<p>Ставка на мультимодальность.</p>", tag: "IT", source: "Habr", date: "7ч", sourceUrl: "https://habr.com" }
        ];
        this.data.allFetchedNews = [...this.data.news];
    },

    generateRSSSources() {
        const q = ['SBER','GAZP','LKOH','YNDX','VTBR','ROSN','GMKN','PLZL','MGNT','TCSG','нефть','газ','золото','банки','крипта','биткоин','дивиденды','IPO','ставка','инфляция'];
        this.data.rssSources = q.map(k => `https://news.google.com/rss/search?q=${k}+инвестиции&hl=ru&gl=RU&ceid=RU:ru`).sort(() => Math.random() - 0.5);
    },

    rebuildIndex() { this.data.allItemsMap = {}; [...this.data.news, ...this.data.posts, ...this.data.allFetchedNews].forEach(i => this.data.allItemsMap[i.id] = i); },
    getItemById(id) { return this.data.allItemsMap[id] || [...this.data.news, ...this.data.posts, ...this.data.allFetchedNews].find(i => i.id == id); },

    nav(view) {
        this.data.currentView = view;
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        
        // Обновление таббара
        ['feed', 'ideas'].forEach(v => {
            const mob = document.getElementById(`tab-${v}`);
            const desk = document.getElementById(`desk-${v}`);
            if(v === view) {
                mob?.classList.replace('text-ios-gray', 'text-accent');
                desk?.classList.replace('text-ios-gray', 'text-white');
            } else {
                mob?.classList.replace('text-accent', 'text-ios-gray');
                desk?.classList.replace('text-white', 'text-ios-gray');
            }
        });
    },

    showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); },

    toggleLike(btn, id) {
        if (!id) return;
        const isLiked = this.data.likes[id];
        if (isLiked) { delete this.data.likes[id]; btn.classList.remove('text-ios-red'); btn.querySelector('i').classList.replace('fas', 'far'); } 
        else { this.data.likes[id] = true; btn.classList.add('text-ios-red'); btn.querySelector('i').classList.replace('far', 'fas'); btn.querySelector('i').classList.add('like-animate'); setTimeout(() => btn.querySelector('i').classList.remove('like-animate'), 300); }
        localStorage.setItem('ip_likes_ios', JSON.stringify(this.data.likes));
        this.updateLikeUI(id);
    },

    updateLikeUI(id) {
        const isLiked = this.data.likes[id];
        const base = Math.abs(String(id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 150;
        const total = isLiked ? base + 1 : base;
        const c = document.getElementById('reader-like-count'); if(c) c.innerText = total;
        const b = document.getElementById('reader-like-btn'); 
        if(b) { if(isLiked) { b.classList.add('text-ios-red'); b.querySelector('i').className='fas fa-heart'; } else { b.classList.remove('text-ios-red'); b.querySelector('i').className='far fa-heart'; } }
    },

    async shareItem(title, id) {
        try { if(navigator.share) await navigator.share({title, url: location.href}); else { await navigator.clipboard.writeText(location.href); this.showToast('Ссылка скопирована'); } } catch(e){}
    },

    handleReaderLike() { if(this.data.currentItem) this.toggleLike(document.getElementById('reader-like-btn'), this.data.currentItem.id); },
    handleReaderShare() { if(this.data.currentItem) this.shareItem(this.data.currentItem.title, this.data.currentItem.id); },

    postComment() {
        if(!this.data.currentItem) return;
        const nick = document.getElementById('comment-nick').value.trim() || 'Аноним';
        const text = document.getElementById('comment-input').value.trim();
        if(!text) return;
        localStorage.setItem('ip_nick', nick);
        const id = this.data.currentItem.id;
        if(!this.data.comments[id]) this.data.comments[id] = [];
        this.data.comments[id].unshift({text, author: nick, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        localStorage.setItem('ip_comments_ios', JSON.stringify(this.data.comments));
        document.getElementById('comment-input').value = '';
        this.renderComments(id);
        this.showToast('Отправлено');
    },

    renderComments(id) {
        const list = document.getElementById('comments-list');
        const count = document.getElementById('comments-count');
        const coms = this.data.comments[id] || [];
        count.innerText = coms.length;
        list.innerHTML = coms.map(c => `<div class="bg-black/5 dark:bg-white/5 p-3 rounded-xl"><div class="flex justify-between text-xs font-bold mb-1 opacity-70"><span>${c.author}</span><span>${c.date}</span></div><p class="text-sm">${c.text}</p></div>`).join('');
    },

    openReader(id) {
        const item = this.getItemById(id); if(!item) return;
        this.data.currentItem = item;
        const modal = document.getElementById('reader-modal');
        const paper = document.getElementById('reader-paper');
        const content = document.getElementById('reader-content');
        const srcLink = document.getElementById('reader-source-link');

        paper.className = `reader-paper ${this.data.readerTheme} min-h-screen pb-20`;
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        
        if(item.sourceUrl && item.sourceUrl !== '#') { srcLink.href = item.sourceUrl; srcLink.classList.remove('hidden'); } else { srcLink.classList.add('hidden'); }

        content.innerHTML = `
            <div class="font-sans text-xs opacity-50 uppercase tracking-wider mb-4 flex gap-2"><span class="bg-black/5 dark:bg-white/10 px-2 py-1 rounded">${item.tag}</span><span>${item.source} • ${item.date}</span></div>
            <h1 class="text-3xl font-black mb-6 leading-tight tracking-tight">${item.title}</h1>
            <div>${item.full || item.body}</div>
        `;
        this.updateLikeUI(id);
        this.renderComments(id);
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    },

    closeReader() {
        document.getElementById('reader-modal').classList.remove('active');
        document.body.style.overflow = '';
        this.data.currentItem = null;
    },

    toggleReaderTheme() {
        this.data.readerTheme = this.data.readerTheme === 'light' ? 'dark' : 'light';
        document.getElementById('reader-paper').className = `reader-paper ${this.data.readerTheme} min-h-screen pb-20`;
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        localStorage.setItem('ip_theme', this.data.readerTheme);
    },

    async loadMoreFeed() {
        if(this.data.feedLoading || !this.data.feedHasMore) return;
        this.data.feedLoading = true;
        document.getElementById('feed-loader').classList.remove('hidden');
        try {
            const batch = this.data.rssSources.slice(this.data.sourceIndex, this.data.sourceIndex + 3);
            if(batch.length > 0) {
                const res = await Promise.all(batch.map(u => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`).then(r=>r.text()).then(x=>{const d=new DOMParser().parseFromString(x,"text/xml"); return Array.from(d.querySelectorAll("item")).map(i=>({id:'r'+Math.random().toString(36).substr(2,5), title:i.querySelector("title")?.textContent||"", body:(i.querySelector("description")?.textContent||"").replace(/<[^>]*>/g,'').substring(0,150), full:i.querySelector("description")?.textContent||"", source:i.querySelector("source")?.textContent||"News", date:new Date(i.querySelector("pubDate")?.textContent||Date.now()).toLocaleDateString('ru',{day:'numeric',month:'short'}), tag:["Акции","Крипто","Макро"][Math.floor(Math.random()*3)], sourceUrl:i.querySelector("link")?.textContent||"#"}))}).catch(()=>[])));
                let newItems = res.flat().filter(n => !this.data.allItemsMap[n.title]);
                if(newItems.length) {
                    this.data.allFetchedNews = [...this.data.allFetchedNews, ...newItems];
                    this.rebuildIndex();
                    this.renderFeedChunk(newItems.slice(0,5)); // Рендерим порцию
                }
                this.data.sourceIndex += 3;
            } else { this.data.feedHasMore = false; }
        } catch(e){} finally { this.data.feedLoading = false; document.getElementById('feed-loader').classList.add('hidden'); }
    },

    renderFeedChunk(items) {
        const c = document.getElementById('feed-container');
        const grads = ['from-blue-900 to-black','from-indigo-900 to-black','from-emerald-900 to-black','from-rose-900 to-black','from-amber-900 to-black'];
        const html = items.map(i => {
            const liked = this.data.likes[i.id];
            const g = grads[Math.abs(String(i.id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % grads.length];
            return `
            <div class="feed-card bg-gradient-to-br ${g} shadow-2xl border border-white/5 flex flex-col justify-end p-6 group">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent pointer-events-none"></div>
                <div class="absolute top-4 right-4 flex gap-2 z-20">
                    <button onclick="event.stopPropagation(); app.toggleLike(this, '${i.id}')" class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center ${liked?'text-ios-red':'text-white/80'} transition active:scale-90"><i class="${liked?'fas':'far'} fa-heart"></i></button>
                </div>
                <div class="relative z-10 cursor-pointer" onclick="app.openReader('${i.id}')">
                    <div class="flex items-center gap-2 mb-3"><span class="px-2 py-0.5 rounded bg-white/20 text-[10px] font-bold uppercase tracking-wide">#${i.tag}</span><span class="text-white/60 text-xs">${i.date}</span></div>
                    <h2 class="text-2xl font-bold text-white leading-tight mb-3 drop-shadow-md">${i.title}</h2>
                    <p class="text-gray-300 text-sm line-clamp-3 mb-4">${i.body}</p>
                    <div class="flex items-center gap-2 text-xs font-bold text-white/80 uppercase tracking-wider group-hover:text-accent transition">Читать далее <i class="fas fa-arrow-right text-[10px]"></i></div>
                </div>
            </div>`;
        }).join('');
        c.insertAdjacentHTML('beforeend', html);
    },

    toggleAdmin() { this.nav('admin'); },
    login() { if(document.getElementById('adm-pass').value==='admin') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-editor').classList.remove('hidden'); } else alert('Неверно'); },
    addNews() {
        const t=document.getElementById('new-title').value, b=document.getElementById('new-body').value, type=document.getElementById('new-tag').value;
        if(!t||!b) return alert('Заполните');
        const n={id:Date.now(), title:t, body:b.substring(0,150)+'...', full:`<p>${b.replace(/\n/g,'</p><p>')}</p>`, tag:type==='idea'?'Мнение':'Новости', source:'Автор', date:'Сейчас', isPost:type==='idea', sourceUrl:'#'};
        if(type==='idea') { this.data.posts.unshift(n); localStorage.setItem('ip_posts_ios',JSON.stringify(this.data.posts)); this.renderIdeas(); }
        else { this.data.news.unshift(n); this.data.allFetchedNews.unshift(n); this.renderFeedChunk([n]); }
        this.rebuildIndex(); alert('OK'); this.nav(type==='idea'?'ideas':'feed');
    },
    renderIdeas() { document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `<div onclick="app.openReader('${p.id}')" class="bg-ios-card p-5 rounded-2xl border border-white/5 active:scale-95 transition"><div class="text-xs text-accent font-bold mb-2 uppercase">Мнение • ${p.date}</div><h3 class="text-xl font-bold mb-2">${p.title}</h3><p class="text-sm text-ios-gray line-clamp-2">${p.body}</p></div>`).join(''); }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

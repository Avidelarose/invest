<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InvestPro | Essence Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ios: { bg: '#000000', card: '#1C1C1E', gray: '#8E8E93', sep: '#38383A', blue: '#0A84FF', red: '#FF453A', green: '#30D158' },
                        accent: '#0A84FF',
                        essence: '#F59E0B' // Янтарный цвет для вкладки "Суть"
                    },
                    fontFamily: { 
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'sans-serif'], 
                        serif: ['Merriweather', 'serif'] 
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #000; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        /* --- FEED STYLES --- */
        .feed-scroll-mobile { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; height: calc(100vh - 84px); padding-left: 1rem; }
        .feed-card-mobile { flex: 0 0 90vw; height: 100%; scroll-snap-align: center; margin-right: 1rem; border-radius: 24px; position: relative; overflow: hidden; }
        
        .feed-grid-desktop { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; padding: 2rem; overflow-y: auto; height: calc(100vh - 80px); }
        .feed-card-desktop { height: 480px; border-radius: 20px; position: relative; overflow: hidden; transition: transform 0.2s; display: flex; flex-direction: column; }
        .feed-card-desktop:hover { transform: translateY(-5px); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- UI ELEMENTS --- */
        .tab-bar { backdrop-filter: saturate(180%) blur(20px); background-color: rgba(28, 28, 30, 0.85); border-top: 0.5px solid rgba(255,255,255,0.1); }
        
        /* --- MODALS --- */
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .reader-box { width: 100%; height: 100%; overflow-y: auto; transition: all 0.3s; background: #F2F2F7; color: #1C1C1E; }
        .reader-box.dark { background: #1C1C1E; color: #F2F2F7; }
        @media (min-width: 768px) { .reader-box { width: 800px; height: 90vh; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); } }

        .prose-ios p { margin-bottom: 1.6em; font-size: 1.1rem; line-height: 1.7; }
        .prose-ios h2 { font-weight: 800; font-size: 1.5rem; margin-top: 2em; margin-bottom: 0.8em; }
        .prose-ios blockquote { border-left: 3px solid #0A84FF; padding-left: 1em; margin: 1.5em 0; font-style: italic; opacity: 0.8; }

        @keyframes likePop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .like-animate { animation: likePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(50,50,50,0.9); color: white; padding: 1.5rem; border-radius: 16px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.2s; text-align: center; backdrop-filter: blur(10px); }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body class="text-gray-100 antialiased selection:bg-accent selection:text-white">

    <div id="toast"><i class="fas fa-check-circle text-3xl mb-2 text-green-500"></i><br><span id="toast-msg">Готово</span></div>

    <!-- === ONBOARDING MODAL (ФАРШ / СУТЬ) === -->
    <div id="essence-modal" class="modal-overlay z-[110]">
        <div class="bg-ios-card w-[90%] max-w-md p-8 rounded-3xl border border-white/10 shadow-2xl text-center transform transition-all scale-100">
            <div class="w-16 h-16 bg-gradient-to-tr from-essence to-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-500/20">
                <i class="fas fa-bolt text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-4">Время — это деньги</h2>
            <p class="text-ios-gray mb-8 leading-relaxed">
                Мы проанализировали 100+ источников и убрали воду. Здесь только <strong class="text-white">сухая выжимка</strong> фактов, цифр и решений.
                <br><br>
                Листай, читай суть за 5 секунд, принимай решения.
            </p>
            <button onclick="app.closeEssenceModal()" class="w-full bg-essence hover:bg-orange-500 text-black font-bold py-4 rounded-xl transition active:scale-95 shadow-lg shadow-orange-500/20">
                Понятно, погнали
            </button>
        </div>
    </div>

    <!-- === DESKTOP HEADER === -->
    <header class="hidden md:flex fixed top-0 w-full h-20 z-40 bg-black/80 backdrop-blur-md border-b border-white/5 items-center justify-between px-8">
        <div class="font-bold text-2xl tracking-tight cursor-pointer" onclick="app.nav('feed')">Invest<span class="text-accent">Pro</span></div>
        <nav class="flex gap-8 font-medium text-sm">
            <button onclick="app.nav('feed')" id="desk-feed" class="text-white hover:text-accent transition">Лента</button>
            <button onclick="app.nav('essence')" id="desk-essence" class="text-ios-gray hover:text-essence transition flex items-center gap-2"><i class="fas fa-bolt text-xs"></i> Суть</button>
            <button onclick="app.nav('ideas')" id="desk-ideas" class="text-ios-gray hover:text-accent transition">Мнения</button>
        </nav>
        <div class="flex items-center gap-4">
            <button onclick="app.showEssenceInfo()" class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/60 hover:text-white hover:border-white transition" title="Что такое Суть?"><i class="fas fa-question text-xs"></i></button>
            <button onclick="app.toggleAdmin()" class="w-10 h-10 rounded-full bg-ios-card flex items-center justify-center text-ios-gray hover:text-white transition"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <!-- === MOBILE HEADER === -->
    <header class="md:hidden fixed top-0 w-full z-40 safe-top bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="h-14 flex items-center justify-between px-4">
            <div class="font-bold text-xl tracking-tight">Invest<span class="text-accent">Pro</span></div>
            <div class="flex items-center gap-3">
                <button onclick="app.showEssenceInfo()" class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/60"><i class="fas fa-question text-xs"></i></button>
                <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-ios-card flex items-center justify-center text-ios-gray"><i class="fas fa-cog text-xs"></i></button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="h-screen w-full overflow-hidden relative">
        
        <!-- VIEW: STANDARD FEED -->
        <section id="view-feed" class="absolute inset-0 pt-14 md:pt-20 pb-20 md:pb-0 bg-black hidden">
            <div id="feed-mobile-standard" class="feed-scroll-mobile no-scrollbar md:hidden pl-4"></div>
            <div id="feed-desktop-standard" class="feed-grid-desktop no-scrollbar hidden md:block"></div>
        </section>

        <!-- VIEW: ESSENCE (FARSH) -->
        <section id="view-essence" class="absolute inset-0 pt-14 md:pt-20 pb-20 md:pb-0 bg-black">
            <div id="feed-mobile-essence" class="feed-scroll-mobile no-scrollbar md:hidden pl-4"></div>
            <div id="feed-desktop-essence" class="feed-grid-desktop no-scrollbar hidden md:block"></div>
            
            <div id="essence-loader" class="absolute bottom-24 md:bottom-8 left-1/2 -translate-x-1/2 text-ios-gray text-sm hidden bg-black/50 px-4 py-2 rounded-full backdrop-blur border border-white/10 z-30">
                <i class="fas fa-circle-notch fa-spin mr-2"></i>Анализ новостей...
            </div>
        </section>

        <!-- VIEW: IDEAS -->
        <section id="view-ideas" class="absolute inset-0 pt-14 md:pt-20 pb-20 md:pb-0 overflow-y-auto px-4 md:px-8 bg-black hidden">
            <div class="max-w-4xl mx-auto py-6">
                <h2 class="text-3xl font-bold mb-8">Авторские мнения</h2>
                <div id="ideas-list" class="grid md:grid-cols-2 gap-6"></div>
            </div>
        </section>

        <!-- VIEW: ADMIN -->
        <section id="view-admin" class="absolute inset-0 pt-14 md:pt-20 pb-20 md:pb-0 overflow-y-auto px-4 bg-black hidden z-50">
            <div class="max-w-lg mx-auto space-y-6 mt-8">
                <h2 class="text-2xl font-bold">Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none focus:border-accent" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent py-3 rounded-xl font-bold text-white">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-4">
                    <select id="new-tag" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none"><option value="news">Новость</option><option value="idea">Мнение</option></select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none">
                    <textarea id="new-body" rows="6" placeholder="Текст..." class="w-full bg-ios-card border border-ios-sep rounded-xl px-4 py-3 text-white outline-none"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-white">Опубликовать</button>
                </div>
            </div>
        </section>

    </main>

    <!-- === MOBILE TAB BAR === -->
    <nav class="md:hidden fixed bottom-0 w-full tab-bar safe-bottom z-50 flex justify-around items-center h-[84px]">
        <button onclick="app.nav('feed')" class="flex flex-col items-center gap-1 w-full py-2 text-ios-gray transition" id="tab-feed">
            <i class="fas fa-newspaper text-xl"></i>
            <span class="text-[10px] font-medium">Лента</span>
        </button>
        <button onclick="app.nav('essence')" class="flex flex-col items-center gap-1 w-full py-2 text-essence transition" id="tab-essence">
            <i class="fas fa-bolt text-xl"></i>
            <span class="text-[10px] font-medium">Суть</span>
        </button>
        <button onclick="app.nav('ideas')" class="flex flex-col items-center gap-1 w-full py-2 text-ios-gray transition" id="tab-ideas">
            <i class="fas fa-lightbulb text-xl"></i>
            <span class="text-[10px] font-medium">Мнения</span>
        </button>
    </nav>

    <!-- READER MODAL -->
    <div id="reader-modal" class="modal-overlay">
        <div id="reader-paper" class="reader-box">
            <div class="sticky top-0 z-10 flex justify-between items-center px-6 py-4 bg-inherit/90 backdrop-blur border-b border-black/5 dark:border-white/5">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-accent font-medium hover:opacity-70"><i class="fas fa-chevron-left"></i> Назад</button>
                <button onclick="app.toggleReaderTheme()" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center hover:bg-black/10 transition"><i id="theme-icon" class="fas fa-moon text-xs"></i></button>
            </div>
            <article id="reader-content" class="prose-ios max-w-2xl mx-auto px-6 py-8"></article>
            <div class="max-w-2xl mx-auto px-6 mt-8 border-t border-black/10 dark:border-white/10 pt-8 pb-20 font-sans">
                <div class="flex gap-3 mb-8">
                    <button id="reader-like-btn" onclick="app.handleReaderLike()" class="flex-1 py-3 rounded-xl font-bold border border-black/10 dark:border-white/10 flex items-center justify-center gap-2 transition active:scale-95"><i class="far fa-heart"></i> <span id="reader-like-count">0</span></button>
                    <button onclick="app.handleReaderShare()" class="flex-1 py-3 rounded-xl font-bold bg-accent text-white flex items-center justify-center gap-2 transition active:scale-95"><i class="fas fa-share-alt"></i> Поделиться</button>
                </div>
                <a id="reader-source-link" href="#" target="_blank" class="block w-full py-3 mb-8 rounded-xl font-bold text-center bg-black text-white dark:bg-white dark:text-black no-underline hidden">Перейти к источнику</a>
                <h3 class="text-lg font-bold mb-4">Комментарии (<span id="comments-count">0</span>)</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="comment-nick" class="bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-sm w-1/3 outline-none" placeholder="Ник">
                    <input type="text" id="comment-input" class="flex-1 bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-sm outline-none" placeholder="Комментарий...">
                    <button onclick="app.postComment()" class="bg-accent text-white w-10 h-10 rounded-lg flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
                </div>
                <div id="comments-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { 
        news: [], posts: [], essenceFeed: [], 
        feedPage: 0, essencePage: 0, 
        feedLoading: false, essenceLoading: false, 
        readerTheme: localStorage.getItem('ip_theme') || 'light',
        likes: JSON.parse(localStorage.getItem('ip_likes_v6') || '{}'),
        comments: JSON.parse(localStorage.getItem('ip_comments_v6') || '{}'),
        userNick: localStorage.getItem('ip_nick') || '',
        currentItem: null, rssSources: []
    },

    init() {
        this.generateRSSSources();
        this.seedData();
        
        const savedPosts = localStorage.getItem('ip_posts_v6');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку", body: "Энергетический кризис только начинается.", full: "<p>Многие боятся рецессии, но я вижу точку входа.</p>", tag: "Мнение", date: "2ч назад", isPost: true }
        ];

        if(this.data.userNick) document.getElementById('comment-nick').value = this.data.userNick;
        
        // Проверка онбординга
        if (!localStorage.getItem('ip_essence_seen')) {
            document.getElementById('essence-modal').classList.add('active');
        }

        this.renderIdeas();
        this.renderFeedChunk(this.data.news.slice(0, 5), 'standard');
        this.renderFeedChunk(this.data.essenceFeed.slice(0, 5), 'essence');
        
        // Listeners
        ['mobile', 'desktop'].forEach(dev => {
            document.getElementById(`feed-${dev}-standard`).addEventListener('scroll', () => this.checkScroll(dev, 'standard'));
            document.getElementById(`feed-${dev}-essence`).addEventListener('scroll', () => this.checkScroll(dev, 'essence'));
        });
    },

    closeEssenceModal() {
        document.getElementById('essence-modal').classList.remove('active');
        localStorage.setItem('ip_essence_seen', 'true');
    },

    showEssenceInfo() {
        document.getElementById('essence-modal').classList.add('active');
    },

    checkScroll(device, type) {
        if (this.data.currentView !== type) return;
        const isLoading = type === 'essence' ? this.data.essenceLoading : this.data.feedLoading;
        if (isLoading) return;

        const el = document.getElementById(`feed-${device}-${type}`);
        const isEnd = device === 'mobile' 
            ? el.scrollLeft + el.clientWidth >= el.scrollWidth - 300
            : el.scrollTop + el.clientHeight >= el.scrollHeight - 300;
            
        if (isEnd) type === 'essence' ? this.loadMoreEssence() : this.loadMoreFeed();
    },

    seedData() {
        // Обычные новости
        this.data.news = [
            { id: 's1', title: "Сбербанк: рекордная прибыль", body: "Чистая прибыль превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность.</p>", tag: "Акции", source: "РБК", date: "1ч", sourceUrl: "https://rbc.ru" },
            { id: 's2', title: "Биткоин > $70,000", body: "Крипта обновила максимум.", full: "<p>Рынок ликует на фоне ETF.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч", sourceUrl: "https://bloomberg.com" }
        ];
        
        // Новости для "Сути" (с выжимкой)
        this.data.essenceFeed = [
            { id: 'e1', title: "ЦБ сохранил ставку 16%", summary: "• Ставка без изменений\n• Инфляция замедляется медленно\n• Жесткая политика продлится до конца года", tag: "Макро", source: "ЦБ РФ", date: "10:30", sourceUrl: "https://cbr.ru" },
            { id: 'e2', title: "Лукойл: дивиденды", summary: "• Рекомендация: 520 руб. на акцию\n• Отсечка: 15 мая\n• Доходность: ~14% годовых", tag: "Дивиденды", source: "Интерфакс", date: "09:15", sourceUrl: "https://interfax.ru" },
            { id: 'e3', title: "Илон Маск про AI", summary: "• Новый чип быстрее H100 в 2 раза\n• Акции NVDA +5% на новостях\n• Релиз FSD v13 перенесен", tag: "Tech", source: "Twitter", date: "Вчера", sourceUrl: "https://twitter.com" }
        ];
    },

    generateRSSSources() {
        const q = ['SBER','GAZP','LKOH','YNDX','VTBR','ROSN','GMKN','PLZL','MGNT','TCSG','нефть','газ','золото','банки','крипта','биткоин','дивиденды','IPO','ставка','инфляция'];
        this.data.rssSources = q.map(k => `https://news.google.com/rss/search?q=${k}+инвестиции&hl=ru&gl=RU&ceid=RU:ru`).sort(() => Math.random() - 0.5);
    },

    nav(view) {
        this.data.currentView = view;
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        
        ['feed', 'essence', 'ideas'].forEach(v => {
            const mob = document.getElementById(`tab-${v}`);
            const desk = document.getElementById(`desk-${v}`);
            const color = v === 'essence' ? 'text-essence' : 'text-white';
            const gray = 'text-ios-gray';
            
            if(v === view) {
                if(mob) { mob.classList.remove(gray); mob.classList.add(color); }
                if(desk) { desk.classList.remove(gray); desk.classList.add(color); }
            } else {
                if(mob) { mob.classList.remove(color); mob.classList.add(gray); }
                if(desk) { desk.classList.remove(color); desk.classList.add(gray); }
            }
        });
    },

    showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); },

    toggleLike(btn, id) {
        if (!id) return;
        const isLiked = this.data.likes[id];
        if (isLiked) { delete this.data.likes[id]; btn.classList.remove('text-ios-red'); btn.querySelector('i').classList.replace('fas', 'far'); } 
        else { this.data.likes[id] = true; btn.classList.add('text-ios-red'); btn.querySelector('i').classList.replace('far', 'fas'); btn.querySelector('i').classList.add('like-animate'); setTimeout(() => btn.querySelector('i').classList.remove('like-animate'), 300); }
        localStorage.setItem('ip_likes_v6', JSON.stringify(this.data.likes));
        this.updateLikeUI(id);
    },

    updateLikeUI(id) {
        const isLiked = this.data.likes[id];
        const base = Math.abs(String(id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 150;
        const total = isLiked ? base + 1 : base;
        const c = document.getElementById('reader-like-count'); if(c) c.innerText = total;
        const b = document.getElementById('reader-like-btn'); 
        if(b) { if(isLiked) { b.classList.add('text-ios-red'); b.querySelector('i').className='fas fa-heart'; } else { b.classList.remove('text-ios-red'); b.querySelector('i').className='far fa-heart'; } }
    },

    handleReaderLike() { if(this.data.currentItem) this.toggleLike(document.getElementById('reader-like-btn'), this.data.currentItem.id); },
    handleReaderShare() { if(this.data.currentItem) { try{navigator.share({title:this.data.currentItem.title, url:location.href})}catch(e){navigator.clipboard.writeText(location.href); this.showToast('Скопировано')} } },

    postComment() {
        if(!this.data.currentItem) return;
        const nick = document.getElementById('comment-nick').value.trim() || 'Аноним';
        const text = document.getElementById('comment-input').value.trim();
        if(!text) return;
        localStorage.setItem('ip_nick', nick);
        const id = this.data.currentItem.id;
        if(!this.data.comments[id]) this.data.comments[id] = [];
        this.data.comments[id].unshift({text, author: nick, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        localStorage.setItem('ip_comments_v6', JSON.stringify(this.data.comments));
        document.getElementById('comment-input').value = '';
        this.renderComments(id);
        this.showToast('Отправлено');
    },

    renderComments(id) {
        const list = document.getElementById('comments-list');
        const count = document.getElementById('comments-count');
        const coms = this.data.comments[id] || [];
        count.innerText = coms.length;
        list.innerHTML = coms.map(c => `<div class="bg-black/5 dark:bg-white/5 p-3 rounded-xl"><div class="flex justify-between text-xs font-bold mb-1 opacity-70"><span>${c.author}</span><span>${c.date}</span></div><p class="text-sm">${c.text}</p></div>`).join('');
    },

    openReader(id, isEssence = false) {
        const item = isEssence 
            ? this.data.essenceFeed.find(i => i.id == id) 
            : [...this.data.news, ...this.data.posts].find(i => i.id == id);
            
        if(!item) return;
        this.data.currentItem = item;
        
        const modal = document.getElementById('reader-modal');
        const paper = document.getElementById('reader-paper');
        const content = document.getElementById('reader-content');
        const srcLink = document.getElementById('reader-source-link');

        if(this.data.readerTheme === 'dark') { paper.classList.add('dark'); paper.classList.remove('light'); }
        else { paper.classList.add('light'); paper.classList.remove('dark'); }
        
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        
        if(item.sourceUrl) { srcLink.href = item.sourceUrl; srcLink.classList.remove('hidden'); } else { srcLink.classList.add('hidden'); }

        // Для "Сути" показываем выжимку крупно, потом ссылку
        let bodyHtml = item.full || item.body;
        if (isEssence && item.summary) {
            bodyHtml = `<div class="bg-black/5 dark:bg-white/5 p-6 rounded-2xl mb-8 border-l-4 border-essence"><h3 class="font-bold text-lg mb-3 flex items-center gap-2"><i class="fas fa-bolt text-essence"></i> Главное</h3><p class="whitespace-pre-line font-medium">${item.summary}</p></div>` + bodyHtml;
        }

        content.innerHTML = `
            <div class="font-sans text-xs opacity-50 uppercase tracking-wider mb-4 flex gap-2"><span class="bg-black/5 dark:bg-white/10 px-2 py-1 rounded">${item.tag}</span><span>${item.source} • ${item.date}</span></div>
            <h1 class="text-3xl font-black mb-6 leading-tight tracking-tight">${item.title}</h1>
            <div>${bodyHtml}</div>
        `;
        
        this.updateLikeUI(id);
        this.renderComments(id);
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    },

    closeReader() {
        document.getElementById('reader-modal').classList.remove('active');
        document.body.style.overflow = '';
        this.data.currentItem = null;
    },

    toggleReaderTheme() {
        this.data.readerTheme = this.data.readerTheme === 'light' ? 'dark' : 'light';
        const paper = document.getElementById('reader-paper');
        if(this.data.readerTheme === 'dark') { paper.classList.add('dark'); paper.classList.remove('light'); }
        else { paper.classList.add('light'); paper.classList.remove('dark'); }
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        localStorage.setItem('ip_theme', this.data.readerTheme);
    },

    async loadMoreFeed() {
        if(this.data.feedLoading) return;
        this.data.feedLoading = true;
        // ... (стандартная логика загрузки RSS как в предыдущих версиях)
        // Для краткости здесь симуляция
        setTimeout(() => { this.data.feedLoading = false; }, 1000);
    },

    async loadMoreEssence() {
        if(this.data.essenceLoading) return;
        this.data.essenceLoading = true;
        document.getElementById('essence-loader').classList.remove('hidden');
        
        // Симуляция генерации "выжимок" из RSS
        setTimeout(() => {
            const newItems = [
                { id: 'gen_'+Date.now(), title: "Отчетность Газпрома", summary: "• Чистая прибыль упала на 40%\n• Дивидендов не будет\n• Капекс сокращен", tag: "Акции", source: "Ведомости", date: "Сегодня", sourceUrl: "#" },
                { id: 'gen_'+(Date.now()+1), title: "ФРС США: протокол", summary: "• Снижение ставки в июне маловероятно\n• Рынок труда перегрет\n• S&P500 -0.5%", tag: "Макро", source: "Reuters", date: "Вчера", sourceUrl: "#" }
            ];
            this.data.essenceFeed = [...this.data.essenceFeed, ...newItems];
            this.renderFeedChunk(newItems, 'essence');
            this.data.essenceLoading = false;
            document.getElementById('essence-loader').classList.add('hidden');
        }, 1500);
    },

    renderFeedChunk(items, type) {
        const mContainer = document.getElementById(`feed-mobile-${type}`);
        const dContainer = document.getElementById(`feed-desktop-${type}`);
        const isEssence = type === 'essence';
        const grads = isEssence 
            ? ['from-orange-900 to-black', 'from-amber-900 to-black', 'from-yellow-900 to-black']
            : ['from-blue-900 to-black','from-indigo-900 to-black','from-emerald-900 to-black'];
        
        const html = items.map(i => {
            const liked = this.data.likes[i.id];
            const g = grads[Math.abs(String(i.id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % grads.length];
            
            // Контент для "Сути" отличается
            const contentBlock = isEssence 
                ? `<div class="bg-black/40 backdrop-blur-sm p-4 rounded-xl border border-white/10 mb-4"><div class="text-essence text-xs font-bold uppercase mb-2 flex items-center gap-1"><i class="fas fa-bolt"></i> Выжимка</div><p class="text-sm text-gray-200 whitespace-pre-line leading-snug">${i.summary || i.body.substring(0,100)+'...'}</p></div>`
                : `<p class="text-gray-300 text-sm line-clamp-3 mb-4 drop-shadow-sm">${i.body}</p>`;

            const btnText = isEssence ? 'Читать источник' : 'Читать далее';
            const btnClass = isEssence ? 'bg-essence text-black hover:bg-orange-400' : 'bg-white/10 text-white hover:bg-white/20';

            const inner = `
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent pointer-events-none z-10"></div>
                <div class="absolute top-4 right-4 flex gap-2 z-20">
                    <button onclick="event.stopPropagation(); app.toggleLike(this, '${i.id}')" class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center ${liked?'text-ios-red':'text-white/80'} transition active:scale-90 border border-white/10"><i class="${liked?'fas':'far'} fa-heart"></i></button>
                </div>
                <div class="relative z-20 h-full flex flex-col justify-end p-6 cursor-pointer" onclick="app.openReader('${i.id}', ${isEssence})">
                    <div class="flex items-center gap-2 mb-3"><span class="px-2 py-0.5 rounded bg-white/20 backdrop-blur text-[10px] font-bold uppercase tracking-wide border border-white/10">#${i.tag}</span><span class="text-white/60 text-xs font-medium">${i.date}</span></div>
                    <h2 class="text-2xl font-bold text-white leading-tight mb-3 drop-shadow-md">${i.title}</h2>
                    ${contentBlock}
                    <div class="mt-auto">
                        <a href="${i.sourceUrl}" target="_blank" onclick="event.stopPropagation()" class="block w-full py-3 rounded-xl font-bold text-center text-sm ${btnClass} transition active:scale-95 no-underline">${btnText} <i class="fas fa-external-link-alt ml-2 text-xs"></i></a>
                    </div>
                </div>
            `;

            const mCard = `<div class="feed-card-mobile bg-gradient-to-br ${g} shadow-2xl border border-white/5 group">${inner}</div>`;
            const dCard = `<div class="feed-card-desktop bg-gradient-to-br ${g} shadow-xl border border-white/5 group hover:shadow-2xl hover:border-white/20">${inner}</div>`;

            return { mCard, dCard };
        });

        mContainer.insertAdjacentHTML('beforeend', html.map(h => h.mCard).join(''));
        dContainer.insertAdjacentHTML('beforeend', html.map(h => h.dCard).join(''));
    },

    toggleAdmin() { this.nav('admin'); },
    login() { if(document.getElementById('adm-pass').value==='admin') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-editor').classList.remove('hidden'); } else alert('Неверно'); },
    addNews() { /* ... стандартная логика ... */ alert('OK'); },
    renderIdeas() { 
        document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `
            <div onclick="app.openReader('${p.id}')" class="bg-ios-card p-6 rounded-2xl border border-white/5 active:scale-95 transition cursor-pointer hover:border-accent/50 group">
                <div class="text-xs text-accent font-bold mb-3 uppercase tracking-wider flex items-center gap-2"><i class="fas fa-pen-nib"></i> Мнение • ${p.date}</div>
                <h3 class="text-xl font-bold mb-3 group-hover:text-accent transition">${p.title}</h3>
                <p class="text-sm text-ios-gray line-clamp-3 leading-relaxed">${p.body}</p>
            </div>
        `).join(''); 
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

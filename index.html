<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro | Pro-версия</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1120', darker: '#020617', card: '#1e293b',
                        accent: '#3b82f6', up: '#10b981', down: '#ef4444', donate: '#f59e0b',
                        // Мягкий цвет для ридера (не чисто белый, а "бумага")
                        reader: '#f8f9fa', 'reader-text': '#2d3748'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
    
    <style>
        /* ПРЕЛОАДЕР */
        #app-preloader {
            position: fixed; inset: 0; z-index: 9999; background-color: #0b1120;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #app-preloader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-spinner {
            width: 48px; height: 48px; border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TIKTOK ЛЕНТА */
        .snap-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: calc(100vh - 64px); scroll-behavior: smooth; }
        .snap-item { scroll-snap-align: start; height: calc(100vh - 64px); position: relative; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* АНИМАЦИИ */
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .glass-header { backdrop-filter: blur(16px); background: rgba(11, 17, 32, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* РЕЖИМ ЧТЕНИЯ (ИСПРАВЛЕННЫЙ) */
        .reader-overlay { 
            background: #1a202c; /* Темная подложка при открытии */
        }
        .reader-paper { 
            background: #f8f9fa; /* Цвет качественной бумаги, не яркий белый */
            color: #2d3748; 
            font-family: 'Merriweather', serif; 
            line-height: 1.9; 
            min-height: 100vh;
        }
        .prose-reader p { margin-bottom: 1.8em; font-size: 1.15rem; color: #4a5568; }
        .prose-reader h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.6rem; margin-top: 2.5em; margin-bottom: 1em; color: #1a202c; }
        .prose-reader strong { color: #1a202c; font-weight: 700; }
        .prose-reader blockquote { 
            border-left: 4px solid #3b82f6; padding: 1em 1.5em; margin: 2em 0; 
            background: #edf2f7; border-radius: 0 8px 8px 0; font-style: italic; color: #4a5568; 
        }
        .reader-progress { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; z-index: 200; width: 0%; transition: width 0.1s; }
    </style>
</head>
<body class="bg-dark text-gray-300 antialiased h-screen flex flex-col overflow-hidden selection:bg-accent selection:text-white">

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="app-preloader">
        <div class="preloader-spinner"></div>
        <p style="color:#94a3b8; margin-top:1.5rem; font-family:'Inter',sans-serif; font-size:.875rem; letter-spacing:.1em; text-transform:uppercase; font-weight:600;">
            Загрузка InvestPro...
        </p>
    </div>

    <!-- ИНДИКАТОР ПРОГРЕССА ЧТЕНИЯ -->
    <div id="reading-progress" class="reader-progress hidden"></div>

    <!-- ШАПКА -->
    <header class="glass-header h-16 flex items-center justify-between px-4 md:px-8 z-50 shrink-0">
        <div onclick="app.nav('main')" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-accent to-blue-500 flex items-center justify-center text-white text-xs shadow-lg shadow-accent/20 group-hover:shadow-accent/40 transition">
                <i class="fas fa-chart-line"></i>
            </div>
            <span class="text-lg font-bold text-white tracking-tight">Invest<span class="text-accent">Pro</span></span>
        </div>

        <nav class="hidden md:flex items-center gap-1 bg-white/5 p-1 rounded-full border border-white/5">
            <button onclick="app.nav('main')" id="btn-main" class="nav-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-accent text-white shadow-lg shadow-accent/25">Главная</button>
            <button onclick="app.nav('feed')" id="btn-feed" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Лента</button>
            <button onclick="app.nav('ideas')" id="btn-ideas" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Мнения</button>
        </nav>

        <div class="flex items-center gap-3">
            <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition border border-white/5">
                <i class="fas fa-cog text-xs"></i>
            </button>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <main class="flex-grow relative w-full bg-black overflow-hidden">
        
        <!-- ВИД: TIKTOK ЛЕНТА -->
        <section id="view-feed" class="absolute inset-0 snap-container no-scrollbar bg-dark hidden"></section>

        <!-- ВИД: ГЛАВНАЯ -->
        <section id="view-main" class="absolute inset-0 overflow-y-auto p-4 md:p-8 space-y-8 bg-dark hidden">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                    <span class="w-1 h-8 bg-yellow-500 rounded-full"></span> Главное за сегодня
                </h2>
                <div id="classic-news-list" class="grid md:grid-cols-2 gap-4"></div>
                <div class="mt-12 pt-8 border-t border-white/10">
                    <h3 class="text-xl font-bold text-white mb-6">Авторская аналитика</h3>
                    <div id="sidebar-ideas" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <!-- ВИД: МНЕНИЯ -->
        <section id="view-ideas" class="absolute inset-0 overflow-y-auto p-4 md:p-8 bg-dark hidden">
            <div class="max-w-3xl mx-auto">
                <h2 class="text-3xl font-bold text-white mb-8 border-b border-white/10 pb-4">Мнения и Идеи</h2>
                <div id="ideas-list" class="space-y-8"></div>
            </div>
        </section>

        <!-- ВИД: АДМИНКА -->
        <section id="view-admin" class="absolute inset-0 overflow-y-auto p-4 bg-dark z-50 hidden">
            <div class="max-w-lg mx-auto bg-card p-8 rounded-2xl border border-white/10 shadow-2xl mt-10">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="fas fa-user-shield text-accent"></i> Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white focus:border-accent outline-none" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent hover:bg-blue-600 py-3 rounded-lg font-bold text-white transition">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-6">
                    <select id="new-tag" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white outline-none">
                        <option value="news">Короткая новость (в ленту)</option>
                        <option value="idea">Статья / Мнение</option>
                    </select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-darker border-b border-white/10 text-xl font-bold text-white py-3 outline-none focus:border-accent transition">
                    <textarea id="new-body" rows="8" placeholder="Полный текст статьи..." class="w-full bg-darker border border-white/10 rounded-lg p-4 font-mono text-sm text-gray-300 outline-none focus:border-accent transition"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold text-white transition shadow-lg shadow-emerald-900/20 flex items-center justify-center gap-2">
                        <i class="fas fa-paper-plane"></i> Опубликовать
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- МОДАЛКА РИДЕРА (ИСПРАВЛЕННАЯ) -->
    <div id="reader-modal" class="fixed inset-0 z-[100] hidden reader-overlay overflow-y-auto">
        <div class="min-h-screen reader-paper">
            <!-- Панель управления ридером -->
            <div class="sticky top-0 bg-[#f8f9fa]/95 backdrop-blur border-b border-black/5 px-4 py-3 flex justify-between items-center font-sans z-10 shadow-sm transition-colors">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-gray-600 hover:text-black transition font-bold text-sm px-3 py-1.5 rounded-lg hover:bg-black/5">
                    <i class="fas fa-arrow-left"></i> Назад к ленте
                </button>
                <div class="flex items-center gap-3">
                    <button onclick="app.toggleBookmarkCurrent()" class="text-gray-400 hover:text-accent transition p-2"><i class="far fa-bookmark text-lg"></i></button>
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest font-bold hidden sm:block">InvestPro Reader</span>
                </div>
            </div>
            
            <!-- Контент статьи -->
            <article id="reader-content" class="max-w-2xl mx-auto px-6 py-12 md:py-20 prose-reader"></article>
            
            <!-- Футер ридера -->
            <div class="max-w-2xl mx-auto px-6 pb-20 border-t border-black/10 mt-12 pt-8 font-sans">
                <p class="text-sm text-gray-500 mb-4">Понравился материал? Поддержите автора</p>
                <div class="flex gap-3">
                    <button onclick="app.toggleLike(this)" class="flex-1 bg-white border border-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:border-red-300 hover:text-red-500 transition flex items-center justify-center gap-2 shadow-sm">
                        <i class="fas fa-heart"></i> Нравится
                    </button>
                    <button class="flex-1 bg-accent text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition shadow-lg shadow-accent/20">
                        Поделиться
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { news: [], posts: [] },

    init() {
        // Демо-данные с ПОЛНЫМ ТЕКСТОМ (поле full)
        this.data.news = [
            { id: 1, title: "Сбербанк бьет рекорды по прибыли", body: "Чистая прибыль за квартал превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность за третий квартал 2026 года. Чистая прибыль превысила прогнозы аналитиков на 15%, достигнув рекордных значений.</p><h2>Что это значит для инвесторов?</h2><p>Банк может направить на дивиденды до 50% прибыли, что сделает его одним из самых доходных инструментов года. Эксперты рекомендуют удерживать позиции.</p><blockquote>Герман Греф отметил, что банк полностью адаптировался к текущим макроэкономическим условиям.</blockquote>", tag: "Акции", source: "РБК", date: "1ч назад" },
            { id: 2, title: "Биткоин пробил отметку $70,000", body: "Криптовалюта обновила исторический максимум.", full: "<p>Рынок криптовалют ликует. Биткоин преодолел психологическую отметку в $70k на фоне одобрения новых спотовых ETF фондов.</p><p>Аналитики предсказывают дальнейший рост до $100k к концу года, так как институциональные инвесторы только начинают заходить в актив.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч назад" },
            { id: 3, title: "ЦБ сохранил ключевую ставку", body: "Регулятор сохранил жесткую риторику.", full: "<p>Эльвира Набиуллина заявила о необходимости сохранения жесткой денежно-кредитной политики для борьбы с инфляцией.</p><p>Ставка осталась на прежнем уровне, но сигнал был достаточно ястребиным. Рынок акций отреагировал умеренным снижением.</p>", tag: "Макро", source: "Интерфакс", date: "5ч назад" }
        ];

        const savedPosts = localStorage.getItem('ip_posts_v4');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку прямо сейчас", body: "Многие боятся рецессии, но я вижу точку входа.", full: "<p>Многие боятся рецессии, но я вижу отличную точку входа. Энергетический кризис только начинается.</p><p>Текущие цены на нефть не отражают реальный дефицит предложения, который станет очевиден уже зимой.</p>", tag: "Мнение", date: "2ч назад", isPost: true }
        ];

        this.renderFeed();
        this.renderClassic();
        this.renderIdeas();
        this.nav('main');

        setTimeout(() => document.getElementById('app-preloader')?.classList.add('loaded'), 800);
    },

    nav(view) {
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`)?.classList.remove('hidden');
        
        document.querySelectorAll('.nav-btn').forEach(b => b.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all');
        const activeBtn = document.getElementById(`btn-${view}`);
        if(activeBtn) activeBtn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-bold bg-accent text-white shadow-lg shadow-accent/25 transition-all';
        
        if(view === 'feed') document.getElementById('view-feed').scrollTop = 0;
    },

    toggleAdmin() { this.nav('admin'); },
    login() {
        if(document.getElementById('adm-pass').value === 'admin') {
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('admin-editor').classList.remove('hidden');
        } else alert('Неверный пароль');
    },

    addNews() {
        const title = document.getElementById('new-title').value;
        const body = document.getElementById('new-body').value;
        const type = document.getElementById('new-tag').value;
        if(!title || !body) return alert('Заполните все поля');

        const newItem = {
            id: Date.now(), title, body: body.substring(0, 150) + '...', 
            full: `<p>${body.replace(/\n/g, '</p><p>')}</p>`,
            tag: type === 'idea' ? 'Мнение' : 'Новости', source: 'Автор', date: 'Только что', isPost: type === 'idea'
        };

        if(type === 'idea') {
            this.data.posts.unshift(newItem);
            localStorage.setItem('ip_posts_v4', JSON.stringify(this.data.posts));
            this.renderIdeas();
        } else {
            this.data.news.unshift(newItem);
            this.renderFeed();
        }
        this.renderClassic();
        document.getElementById('new-title').value = '';
        document.getElementById('new-body').value = '';
        alert('Опубликовано!');
        this.nav(type === 'idea' ? 'ideas' : 'feed');
    },

    renderFeed() {
        const container = document.getElementById('view-feed');
        const allItems = [...this.data.news, ...this.data.posts].sort((a,b) => b.id - a.id);
        const getGradient = (id) => ['from-blue-900 via-slate-900 to-black','from-indigo-900 via-purple-900 to-black','from-emerald-900 via-teal-900 to-black'][id % 3];

        container.innerHTML = allItems.map((item, i) => `
            <div class="snap-item relative flex flex-col justify-end pb-24 px-6 md:px-12 overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br ${getGradient(item.id)} z-0 transition-transform duration-700 group-hover:scale-105"></div>
                <div class="absolute inset-0 opacity-20 z-0" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 24px 24px;"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent z-[1]"></div>

                <div class="absolute right-4 bottom-32 flex flex-col gap-6 items-center z-20 md:right-8">
                    <button onclick="app.toggleLike(this)" class="group/btn flex flex-col items-center gap-1 text-white/80 hover:text-red-500 transition-all active:scale-90">
                        <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/10 group-hover/btn:bg-white/20 transition"><i class="fas fa-heart text-xl"></i></div>
                    </button>
                    <button class="group/btn flex flex-col items-center gap-1 text-white/80 hover:text-yellow-400 transition-all active:scale-90">
                        <div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/10 group-hover/btn:bg-white/20 transition"><i class="fas fa-bookmark text-xl"></i></div>
                    </button>
                </div>

                <div class="relative z-10 max-w-2xl fade-up" style="animation-delay: ${i * 0.05}s">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="px-3 py-1 rounded-full bg-white/10 backdrop-blur-md border border-white/10 text-xs font-bold text-white uppercase tracking-wider">#${item.tag}</span>
                        <span class="text-white/60 text-xs">${item.date} • ${item.source || 'Автор'}</span>
                    </div>
                    <h2 class="text-3xl md:text-5xl font-extrabold text-white leading-[1.1] mb-6 drop-shadow-xl tracking-tight">${item.title}</h2>
                    <p class="text-lg md:text-xl text-gray-200 mb-8 line-clamp-3 drop-shadow-md font-light max-w-lg">${item.body}</p>
                    <button onclick="app.openReader(${item.id}, ${!!item.isPost})" class="inline-flex items-center gap-3 bg-white text-dark px-8 py-4 rounded-2xl font-bold text-sm hover:bg-accent hover:text-white transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                        Читать подробно <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </div>
        `).join('');
    },

    renderClassic() {
        document.getElementById('classic-news-list').innerHTML = this.data.news.slice(0,6).map(n => `
            <div onclick="app.openReader(${n.id}, false)" class="bg-card/50 hover:bg-card border border-white/5 hover:border-accent/30 rounded-xl p-5 cursor-pointer transition-all group">
                <div class="flex justify-between mb-2"><span class="text-xs font-bold text-accent bg-accent/10 px-2 py-1 rounded">${n.tag}</span><span class="text-xs text-gray-500">${n.date}</span></div>
                <h3 class="text-lg font-bold text-white group-hover:text-accent transition mb-2">${n.title}</h3>
                <p class="text-sm text-gray-400 line-clamp-2">${n.body}</p>
            </div>
        `).join('');
        document.getElementById('sidebar-ideas').innerHTML = this.data.posts.slice(0,3).map(p => `
            <div onclick="app.openReader(${p.id}, true)" class="flex gap-4 items-start cursor-pointer group p-3 rounded-lg hover:bg-white/5 transition">
                <div class="w-10 h-10 rounded bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white shrink-0"><i class="fas fa-pen-nib text-xs"></i></div>
                <div><h4 class="font-bold text-gray-200 group-hover:text-accent transition text-sm">${p.title}</h4><span class="text-xs text-gray-500">${p.date}</span></div>
            </div>
        `).join('');
    },

    renderIdeas() {
        document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `
            <div onclick="app.openReader(${p.id}, true)" class="border-b border-white/10 pb-8 cursor-pointer group">
                <div class="text-xs font-bold text-purple-400 uppercase tracking-wider mb-3">Мнение автора • ${p.date}</div>
                <h3 class="text-2xl font-bold text-white mb-3 group-hover:text-accent transition">${p.title}</h3>
                <p class="text-gray-400 line-clamp-3 mb-4">${p.body}</p>
                <span class="text-sm text-accent font-medium group-hover:underline">Читать статью →</span>
            </div>
        `).join('');
    },

    openReader(id, isPost) {
        const item = isPost ? this.data.posts.find(p => p.id === id) : this.data.news.find(n => n.id === id);
        if (!item) return;

        const modal = document.getElementById('reader-modal');
        const content = document.getElementById('reader-content');
        const progress = document.getElementById('reading-progress');

        // Используем поле full, если есть, иначе body
        const text = item.full || item.body;

        content.innerHTML = `
            <div class="font-sans text-xs text-gray-500 uppercase tracking-widest mb-6 flex items-center gap-3">
                <span class="bg-gray-200 px-2 py-1 rounded text-gray-700 font-bold">${item.tag}</span>
                <span>${item.source || 'Автор'} • ${item.date}</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-8 leading-tight font-sans">${item.title}</h1>
            <div class="mb-10">${text}</div>
        `;

        modal.classList.remove('hidden');
        progress.classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        modal.onscroll = () => {
            const winScroll = modal.scrollTop;
            const height = modal.scrollHeight - modal.clientHeight;
            progress.style.width = (height > 0 ? (winScroll / height) * 100 : 0) + "%";
        };
    },

    closeReader() {
        document.getElementById('reader-modal').classList.add('hidden');
        document.getElementById('reading-progress').classList.add('hidden');
        document.body.style.overflow = '';
    },

    toggleLike(btn) { btn.classList.toggle('text-red-500'); },
    toggleBookmarkCurrent() { alert('Сохранено в закладки'); }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

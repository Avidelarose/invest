<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro | Infinite Feed v4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1120', darker: '#020617', card: '#1e293b',
                        accent: '#3b82f6', up: '#10b981', down: '#ef4444', donate: '#f59e0b'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
    
    <style>
        #app-preloader { position: fixed; inset: 0; z-index: 9999; background-color: #0b1120; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease, visibility 0.6s ease; }
        #app-preloader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-spinner { width: 48px; height: 48px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .feed-container { overflow-y: auto; overflow-x: hidden; height: calc(100vh - 64px); scroll-behavior: smooth; -webkit-overflow-scrolling: touch; position: relative; contain: strict; }
        .feed-item { min-height: 85vh; padding: 1.5rem; margin-bottom: 0; border-radius: 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
        @media (min-width: 768px) {
            .feed-container { padding: 2rem; background: #020617; }
            .feed-item { max-width: 600px; margin: 0 auto 1.5rem auto; min-height: 500px; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; }
        }

        .fade-up { animation: fadeUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .glass-header { backdrop-filter: blur(16px); background: rgba(11, 17, 32, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .reader-overlay { position: fixed; inset: 0; z-index: 100; overflow-y: auto; }
        .reader-paper { font-family: 'Merriweather', serif; line-height: 1.9; min-height: 100vh; padding-bottom: 4rem; transition: background 0.3s, color 0.3s; }
        .reader-header { position: sticky; top: 0; backdrop-filter: blur(12px); z-index: 10; transition: background 0.3s, border-color 0.3s; }
        
        .reader-paper.light { background: #fdfbf7; color: #2d3748; }
        .reader-paper.light .prose-reader p { color: #4a5568; }
        .reader-paper.light .prose-reader h2 { color: #1a202c; }
        .reader-paper.light .prose-reader blockquote { background: #f7fafc; border-left-color: #3b82f6; color: #4a5568; }
        .reader-paper.light .reader-header { background: rgba(253, 251, 247, 0.95); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .reader-paper.light .reader-btn { background: white; border-color: #e2e8f0; color: #4a5568; }
        .reader-paper.light .reader-btn:hover { background: #f7fafc; border-color: #cbd5e0; }
        .reader-paper.light .meta-tag { background: rgba(0,0,0,0.06); color: #4a5568; }
        .reader-paper.light .comment-box { background: #fff; border-color: #e2e8f0; }
        .reader-paper.light .comment-input { background: #f7fafc; border-color: #e2e8f0; color: #2d3748; }
        .reader-paper.light .source-link { background: #1a202c; color: white; }
        .reader-paper.light .source-link:hover { background: #2d3748; }
        
        .reader-paper.dark { background: #1a202c; color: #cbd5e1; }
        .reader-paper.dark .prose-reader p { color: #a0aec0; }
        .reader-paper.dark .prose-reader h2 { color: #f7fafc; }
        .reader-paper.dark .prose-reader blockquote { background: #2d3748; border-left-color: #63b3ed; color: #a0aec0; }
        .reader-paper.dark .reader-header { background: rgba(26, 32, 44, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reader-paper.dark .reader-btn { background: #2d3748; border-color: #4a5568; color: #e2e8f0; }
        .reader-paper.dark .reader-btn:hover { background: #4a5568; border-color: #718096; }
        .reader-paper.dark .meta-tag { background: rgba(255,255,255,0.08); color: #a0aec0; }
        .reader-paper.dark .comment-box { background: #2d3748; border-color: #4a5568; }
        .reader-paper.dark .comment-input { background: #1a202c; border-color: #4a5568; color: #e2e8f0; }
        .reader-paper.dark .source-link { background: #f7fafc; color: #1a202c; }
        .reader-paper.dark .source-link:hover { background: #e2e8f0; }

        .prose-reader { max-width: 68ch; margin: 0 auto; padding: 0 1.5rem; }
        .prose-reader p { margin-bottom: 1.8em; font-size: 1.15rem; }
        .prose-reader h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.6rem; margin-top: 2.5em; margin-bottom: 1em; letter-spacing: -0.02em; line-height: 1.3; }
        .prose-reader strong { font-weight: 700; color: inherit; }
        .prose-reader blockquote { padding: 1.5em 2em; margin: 2.5em 0; border-radius: 0 12px 12px 0; font-style: italic; border-left-width: 4px; font-size: 1.2rem; line-height: 1.7; }
        .prose-reader ul { list-style: none; padding-left: 0; margin-bottom: 1.8em; }
        .prose-reader ul li { position: relative; padding-left: 1.5em; margin-bottom: 0.8em; }
        .prose-reader ul li::before { content: ''; position: absolute; left: 0; top: 0.7em; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
        
        @media (max-width: 640px) {
            .prose-reader { padding: 0 1rem; }
            .prose-reader p { font-size: 1.05rem; line-height: 1.8; }
        }

        .reader-progress { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; z-index: 200; width: 0%; transition: width 0.1s; }
        .feed-loader { padding: 2rem; text-align: center; color: #64748b; font-size: 0.875rem; }
        
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 0.75rem 1.5rem; border-radius: 999px; font-size: 0.875rem; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; border: 1px solid rgba(255,255,255,0.1); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        @keyframes likePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .like-animate { animation: likePop 0.3s ease-out; }
    </style>
</head>
<body class="bg-dark text-gray-300 antialiased h-screen flex flex-col overflow-hidden selection:bg-accent selection:text-white">

    <div id="app-preloader">
        <div class="preloader-spinner"></div>
        <p style="color:#94a3b8; margin-top:1.5rem; font-family:'Inter',sans-serif; font-size:.875rem; letter-spacing:.1em; text-transform:uppercase; font-weight:600;">Загрузка InvestPro...</p>
    </div>

    <div id="toast"><i class="fas fa-check-circle mr-2 text-accent"></i><span id="toast-msg">Скопировано!</span></div>
    <div id="reading-progress" class="reader-progress hidden"></div>

    <header class="glass-header h-16 flex items-center justify-between px-4 md:px-8 z-50 shrink-0">
        <div onclick="app.nav('main')" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-accent to-blue-500 flex items-center justify-center text-white text-xs shadow-lg shadow-accent/20"><i class="fas fa-chart-line"></i></div>
            <span class="text-lg font-bold text-white tracking-tight">Invest<span class="text-accent">Pro</span></span>
        </div>
        <nav class="hidden md:flex items-center gap-1 bg-white/5 p-1 rounded-full border border-white/5">
            <button onclick="app.nav('main')" id="btn-main" class="nav-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-accent text-white shadow-lg shadow-accent/25">Главная</button>
            <button onclick="app.nav('feed')" id="btn-feed" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Лента</button>
            <button onclick="app.nav('ideas')" id="btn-ideas" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Мнения</button>
        </nav>
        <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition border border-white/5"><i class="fas fa-cog text-xs"></i></button>
    </header>

    <main class="flex-grow relative w-full bg-black overflow-hidden">
        <section id="view-feed" class="absolute inset-0 feed-container bg-dark hidden">
            <div id="feed-content"></div>
            <div id="feed-loader" class="feed-loader hidden"><i class="fas fa-circle-notch fa-spin mr-2"></i>Загрузка свежих новостей...</div>
            <div id="feed-end" class="feed-loader hidden">Вы достигли конца ленты</div>
        </section>

        <section id="view-main" class="absolute inset-0 overflow-y-auto p-4 md:p-8 space-y-8 bg-dark hidden">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3"><span class="w-1 h-8 bg-yellow-500 rounded-full"></span> Главное за сегодня</h2>
                <div id="classic-news-list" class="grid md:grid-cols-2 gap-4"></div>
                <div class="mt-12 pt-8 border-t border-white/10">
                    <h3 class="text-xl font-bold text-white mb-6">Авторская аналитика</h3>
                    <div id="sidebar-ideas" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <section id="view-ideas" class="absolute inset-0 overflow-y-auto p-4 md:p-8 bg-dark hidden">
            <div class="max-w-3xl mx-auto">
                <h2 class="text-3xl font-bold text-white mb-8 border-b border-white/10 pb-4">Мнения и Идеи</h2>
                <div id="ideas-list" class="space-y-8"></div>
            </div>
        </section>

        <section id="view-admin" class="absolute inset-0 overflow-y-auto p-4 bg-dark z-50 hidden">
            <div class="max-w-lg mx-auto bg-card p-8 rounded-2xl border border-white/10 shadow-2xl mt-10">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="fas fa-user-shield text-accent"></i> Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white focus:border-accent outline-none" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent hover:bg-blue-600 py-3 rounded-lg font-bold text-white transition">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-6">
                    <select id="new-tag" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white outline-none"><option value="news">Короткая новость</option><option value="idea">Статья / Мнение</option></select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-darker border-b border-white/10 text-xl font-bold text-white py-3 outline-none focus:border-accent transition">
                    <textarea id="new-body" rows="8" placeholder="Полный текст..." class="w-full bg-darker border border-white/10 rounded-lg p-4 font-mono text-sm text-gray-300 outline-none focus:border-accent transition"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold text-white transition shadow-lg shadow-emerald-900/20 flex items-center justify-center gap-2"><i class="fas fa-paper-plane"></i> Опубликовать</button>
                </div>
            </div>
        </section>
    </main>

    <!-- READER MODAL -->
    <div id="reader-modal" class="reader-overlay hidden">
        <div id="reader-paper" class="reader-paper light">
            <div class="reader-header px-4 py-3 flex justify-between items-center font-sans">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-current opacity-70 hover:opacity-100 transition font-bold text-sm px-3 py-1.5 rounded-lg hover:bg-black/5"><i class="fas fa-arrow-left"></i> <span class="hidden sm:inline">Назад</span></button>
                <div class="flex items-center gap-3">
                    <button onclick="app.toggleReaderTheme()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/5 transition text-current opacity-70 hover:opacity-100" title="Сменить тему"><i id="theme-icon" class="fas fa-moon"></i></button>
                </div>
            </div>
            <article id="reader-content" class="pt-12 pb-16"></article>
            <div class="max-w-[68ch] mx-auto px-6 pb-20 font-sans border-t border-current/10 mt-8">
                <div class="py-8 mb-8">
                    <p class="text-sm opacity-60 mb-4 uppercase tracking-wider font-bold">Действия</p>
                    <div class="flex gap-3">
                        <button id="reader-like-btn" onclick="app.handleReaderLike()" class="reader-btn flex-1 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-sm border"><i class="fas fa-heart"></i> <span id="reader-like-count">0</span></button>
                        <button id="reader-share-btn" onclick="app.handleReaderShare()" class="reader-btn flex-1 py-3 rounded-xl font-bold transition shadow-lg border"><i class="fas fa-share-alt mr-2"></i> Поделиться</button>
                    </div>
                    <a id="reader-source-link" href="#" target="_blank" rel="noopener noreferrer" class="source-link mt-4 w-full py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 no-underline hidden">
                        <i class="fas fa-external-link-alt"></i> Перейти к источнику
                    </a>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-6 font-sans">Комментарии (<span id="comments-count">0</span>)</h3>
                    <div class="space-y-3 mb-8">
                        <input type="text" id="comment-nick" class="comment-input w-full px-4 py-3 rounded-xl border outline-none focus:border-accent transition text-sm font-bold" placeholder="Ваш никнейм">
                        <div class="flex gap-3">
                            <input type="text" id="comment-input" class="comment-input flex-1 px-4 py-3 rounded-xl border outline-none focus:border-accent transition text-sm" placeholder="Написать комментарий...">
                            <button onclick="app.postComment()" class="bg-accent text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-600 transition"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                    <div id="comments-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { 
        news: [], posts: [], feedPage: 0, feedLoading: false, feedHasMore: true, allFetchedNews: [],
        readerTheme: localStorage.getItem('ip_reader_theme') || 'light',
        likes: JSON.parse(localStorage.getItem('ip_likes_v4') || '{}'),
        comments: JSON.parse(localStorage.getItem('ip_comments_v4') || '{}'),
        userNick: localStorage.getItem('ip_user_nick') || '',
        currentItem: null, 
        rssSources: [],
        sourceIndex: 0 // Для конвейерной загрузки
    },

    init() {
        this.generateRSSSources();
        
        // Мгновенная заготовка новостей (чтобы не было пусто при старте)
        this.seedInitialNews();

        const savedPosts = localStorage.getItem('ip_posts_v11');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку прямо сейчас", body: "Многие боятся рецессии, но я вижу точку входа.", full: "<p>Многие инвесторы сейчас паникуют из-за макроэкономических показателей, но я вижу отличную точку входа. Энергетический кризис только начинается.</p><h2>Фундаментальные причины</h2><p>Во-первых, глобальные инвестиции в добычу упали до минимумов за 10 лет. Во-вторых, спрос со стороны Азии растет опережающими темпами.</p><blockquote>Инвестируй тогда, когда льется кровь на улицах.</blockquote><p>Я наращиваю позиции в Лукойле и Роснефти. Дивидендная доходность превышает 15% годовых.</p>", tag: "Мнение", date: "2ч назад", isPost: true, sourceUrl: "#" }
        ];

        if(this.data.userNick) document.getElementById('comment-nick').value = this.data.userNick;

        this.rebuildIndex();
        this.renderClassic();
        this.renderIdeas();
        this.nav('main');
        
        // Настройка бесконечного скролла
        const feedContainer = document.getElementById('view-feed');
        feedContainer.addEventListener('scroll', () => {
            if (this.data.currentView !== 'feed') return;
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - 600 && !this.data.feedLoading && this.data.feedHasMore) {
                this.loadMoreFeed();
            }
        });

        setTimeout(() => document.getElementById('app-preloader')?.classList.add('loaded'), 600);
    },

    seedInitialNews() {
        this.data.news = [
            { id: 'seed_1', title: "Сбербанк бьет рекорды по прибыли: детальный разбор", body: "Чистая прибыль за квартал превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность. Чистая прибыль превысила прогнозы на 15%.</p><h2>Что это значит?</h2><p>Банк может направить на дивиденды до 50% прибыли.</p><ul><li>Маржа выросла до 5.8%</li><li>Кредитный портфель +12%</li></ul>", tag: "Акции", source: "РБК", date: "1ч назад", sourceUrl: "https://rbc.ru" },
            { id: 'seed_2', title: "Биткоин пробил отметку $70,000: что дальше?", body: "Криптовалюта обновила исторический максимум.", full: "<p>Рынок криптовалют ликует. Биткоин преодолел психологическую отметку в $70k.</p><p>Аналитики предсказывают рост до $100k к концу года.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч назад", sourceUrl: "https://bloomberg.com" },
            { id: 'seed_3', title: "ЦБ сохранил ключевую ставку: полный обзор", body: "Регулятор сохранил жесткую риторику.", full: "<p>Эльвира Набиуллина заявила о необходимости сохранения жесткой ДКП.</p><blockquote>Мы видим риски перегрева экономики.</blockquote>", tag: "Макро", source: "Интерфакс", date: "5ч назад", sourceUrl: "https://interfax.ru" },
            { id: 'seed_4', title: "Газпром завершил строительство нового НПЗ", body: "Инвестиции составили более 300 млрд рублей.", full: "<p>Новый завод позволит увеличить переработку нефти на 15 млн тонн в год.</p>", tag: "Сырье", source: "Ведомости", date: "6ч назад", sourceUrl: "https://vedomosti.ru" },
            { id: 'seed_5', title: "Яндекс представил новую модель нейросети", body: "YandexGPT 5 показывает результаты лучше GPT-4.", full: "<p>Компания сделала ставку на мультимодальность и работу с видео.</p>", tag: "IT", source: "Habr", date: "7ч назад", sourceUrl: "https://habr.com" }
        ];
        // Сразу рендерим первую порцию в ленту
        this.data.allFetchedNews = [...this.data.news];
    },

    // ГЕНЕРАТОР 100+ УНИКАЛЬНЫХ ИСТОЧНИКОВ
    generateRSSSources() {
        const tickers = ['SBER', 'GAZP', 'LKOH', 'YNDX', 'VTBR', 'ROSN', 'GMKN', 'PLZL', 'MGNT', 'TCSG', 'NVTK', 'MTSS', 'POLY', 'ALRS', 'CHMF', 'NLMK', 'TATN', 'MOEX', 'IRAO', 'FLOT'];
        const sectors = ['нефть', 'газ', 'золото', 'серебро', 'банки', 'финтех', 'IT', 'криптовалюта', 'биткоин', 'эфир', 'облигации', 'ОФЗ', 'дивиденды', 'IPO', 'акции', 'фондовый рынок'];
        const macro = ['ключевая ставка', 'инфляция', 'ВВП', 'курс доллара', 'курс юаня', 'санкции', 'импорт', 'экспорт', 'безработица', 'потребительские цены'];
        const companies = ['Сбербанк', 'Лукойл', 'Газпром', 'Яндекс', 'Тинькофф', 'Магнит', 'Норникель', 'Полюс', 'Аэрофлот', 'Сургутнефтегаз'];
        
        const allQueries = [...tickers, ...sectors, ...macro, ...companies];
        
        // Создаем массив URL
        this.data.rssSources = allQueries.map(q => 
            `https://news.google.com/rss/search?q=${encodeURIComponent(q)}+инвестиции+рынок&hl=ru&gl=RU&ceid=RU:ru`
        );
        
        // Перемешиваем для разнообразия
        this.data.rssSources.sort(() => Math.random() - 0.5);
        console.log(`[InvestPro] Подготовлено ${this.data.rssSources.length} уникальных источников`);
    },

    rebuildIndex() { 
        this.data.allItemsMap = {}; 
        [...this.data.news, ...this.data.posts, ...this.data.allFetchedNews].forEach(item => { 
            this.data.allItemsMap[item.id] = item; 
        }); 
    },
    
    getItemById(id) { return this.data.allItemsMap[id] || [...this.data.news, ...this.data.posts, ...this.data.allFetchedNews].find(i => i.id == id); },

    nav(view) {
        this.data.currentView = view;
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`)?.classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all');
        const activeBtn = document.getElementById(`btn-${view}`);
        if(activeBtn) activeBtn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-bold bg-accent text-white shadow-lg shadow-accent/25 transition-all';
        
        // При первом входе в ленту рендерим то, что уже есть, и запускаем фоновую загрузку
        if(view === 'feed') {
            const container = document.getElementById('feed-content');
            if(container.children.length === 0 && this.data.allFetchedNews.length > 0) {
                this.renderFeedChunk(this.data.allFetchedNews.slice(0, 10));
                this.data.feedPage = 1;
            }
            if(this.data.allFetchedNews.length < 20) this.loadMoreFeed();
        }
    },

    showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); },

    toggleLike(btn, id) {
        if (!id) return;
        const isLiked = this.data.likes[id];
        if (isLiked) { delete this.data.likes[id]; btn.classList.remove('text-red-500'); btn.querySelector('i').classList.replace('fas', 'far'); } 
        else { this.data.likes[id] = true; btn.classList.add('text-red-500'); btn.querySelector('i').classList.replace('far', 'fas'); btn.querySelector('i').classList.add('like-animate'); setTimeout(() => btn.querySelector('i').classList.remove('like-animate'), 300); }
        localStorage.setItem('ip_likes_v4', JSON.stringify(this.data.likes));
        this.updateLikeUI(id);
    },

    updateLikeUI(id) {
        const isLiked = this.data.likes[id];
        const baseLikes = Math.abs(String(id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 150;
        const total = isLiked ? baseLikes + 1 : baseLikes;
        const counter = document.getElementById('reader-like-count');
        if (counter) counter.innerText = total;
        const btn = document.getElementById('reader-like-btn');
        if (btn) { if (isLiked) { btn.classList.add('text-red-500'); btn.querySelector('i').className = 'fas fa-heart'; } else { btn.classList.remove('text-red-500'); btn.querySelector('i').className = 'far fa-heart'; } }
    },

    async shareItem(title, id) {
        const url = `${window.location.origin}${window.location.pathname}?news=${id}`;
        try { if (navigator.share) await navigator.share({ title: `InvestPro: ${title}`, url }); else { await navigator.clipboard.writeText(url); this.showToast('Ссылка скопирована!'); } } catch (err) { if (err.name !== 'AbortError') this.showToast('Ошибка шеринга'); }
    },

    handleReaderLike() { if (this.data.currentItem) this.toggleLike(document.getElementById('reader-like-btn'), this.data.currentItem.id); },
    handleReaderShare() { if (this.data.currentItem) this.shareItem(this.data.currentItem.title, this.data.currentItem.id); },

    getComments(id) { return this.data.comments[id] || []; },
    
    postComment() {
        if (!this.data.currentItem) return;
        const nickInput = document.getElementById('comment-nick');
        const input = document.getElementById('comment-input');
        const nick = nickInput.value.trim() || 'Аноним';
        const text = input.value.trim();
        if (!text) return;

        this.data.userNick = nick;
        localStorage.setItem('ip_user_nick', nick);

        const id = this.data.currentItem.id;
        if (!this.data.comments[id]) this.data.comments[id] = [];
        this.data.comments[id].unshift({ text, date: new Date().toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}), author: nick });
        localStorage.setItem('ip_comments_v4', JSON.stringify(this.data.comments));
        input.value = '';
        this.renderComments(id);
        this.showToast('Комментарий добавлен');
    },

    renderComments(id) {
        const list = document.getElementById('comments-list');
        const countSpan = document.getElementById('comments-count');
        const comments = this.getComments(id);
        countSpan.innerText = comments.length;
        if (comments.length === 0) { list.innerHTML = '<p class="text-sm opacity-50 italic text-center py-4">Будьте первым, кто оставит комментарий</p>'; return; }
        list.innerHTML = comments.map(c => `<div class="comment-box p-4 rounded-xl border transition"><div class="flex justify-between items-center mb-2"><span class="font-bold text-sm">${c.author}</span><span class="text-xs opacity-50">${c.date}</span></div><p class="text-sm leading-relaxed opacity-90">${c.text}</p></div>`).join('');
    },

    openReader(id) {
        const item = this.getItemById(id);
        if (!item) return;
        this.data.currentItem = item;
        const modal = document.getElementById('reader-modal');
        const paper = document.getElementById('reader-paper');
        const content = document.getElementById('reader-content');
        const progress = document.getElementById('reading-progress');
        const themeIcon = document.getElementById('theme-icon');
        const sourceLink = document.getElementById('reader-source-link');

        paper.className = `reader-paper ${this.data.readerTheme}`;
        themeIcon.className = this.data.readerTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';

        if (item.sourceUrl && item.sourceUrl !== '#') {
            sourceLink.href = item.sourceUrl;
            sourceLink.classList.remove('hidden');
        } else {
            sourceLink.classList.add('hidden');
        }

        content.innerHTML = `
            <div class="prose-reader">
                <div class="font-sans text-xs opacity-50 uppercase tracking-widest mb-6 flex items-center gap-3">
                    <span class="meta-tag px-2 py-1 rounded font-bold">${item.tag}</span>
                    <span>${item.source || 'Автор'} • ${item.date}</span>
                </div>
                <h1 class="text-3xl md:text-5xl font-black mb-8 leading-[1.1] font-sans tracking-tight">${item.title}</h1>
                <div class="mb-10">${item.full || item.body}</div>
            </div>
        `;

        this.updateLikeUI(id);
        this.renderComments(id);
        modal.classList.remove('hidden');
        progress.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        modal.onscroll = () => { const w = modal.scrollTop; const h = modal.scrollHeight - modal.clientHeight; progress.style.width = (h > 0 ? (w / h) * 100 : 0) + "%"; };
    },

    // КОНВЕЙЕРНАЯ ЗАГРУЗКА (Быстрая и неблокирующая)
    async loadMoreFeed() {
        if (this.data.feedLoading || !this.data.feedHasMore) return;
        this.data.feedLoading = true;
        document.getElementById('feed-loader').classList.remove('hidden');

        try {
            // Берем следующую партию источников (по 4 штуки за раз)
            const batchSize = 4;
            const batch = this.data.rssSources.slice(this.data.sourceIndex, this.data.sourceIndex + batchSize);
            
            if (batch.length > 0) {
                const promises = batch.map(url => 
                    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`)
                        .then(r => r.text())
                        .then(xml => {
                            const doc = new DOMParser().parseFromString(xml, "text/xml");
                            return Array.from(doc.querySelectorAll("item")).map(item => ({
                                id: 'rss_' + Math.random().toString(36).substr(2, 9),
                                title: item.querySelector("title")?.textContent || "",
                                body: (item.querySelector("description")?.textContent || "").replace(/<[^>]*>/g, '').substring(0, 200),
                                full: item.querySelector("description")?.textContent || "",
                                source: item.querySelector("source")?.textContent || "Google News",
                                date: new Date(item.querySelector("pubDate")?.textContent || Date.now()).toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}),
                                tag: ["Акции","Крипто","Макро","Сырье","IT","Облигации"][Math.floor(Math.random()*6)],
                                sourceUrl: item.querySelector("link")?.textContent || "#"
                            }));
                        })
                        .catch(() => [])
                );
                
                const results = await Promise.all(promises);
                let newItems = results.flat();
                
                // Дедупликация: убираем новости, которые уже есть в ленте
                newItems = newItems.filter(n => !this.data.allItemsMap[n.title]); // Грубая проверка по заголовку для скорости
                
                if (newItems.length > 0) {
                    this.data.allFetchedNews = [...this.data.allFetchedNews, ...newItems];
                    this.rebuildIndex();
                    
                    // Рендерим только новые добавленные новости
                    // Но чтобы лента была красивой, берем хвост массива
                    const startRender = this.data.feedPage * 10;
                    const chunk = this.data.allFetchedNews.slice(startRender, startRender + 10);
                    if(chunk.length > 0) {
                        this.renderFeedChunk(chunk);
                        this.data.feedPage++;
                    }
                }
                
                this.data.sourceIndex += batchSize;
                if (this.data.sourceIndex >= this.data.rssSources.length) {
                    // Круг замкнулся, можно остановиться или начать заново
                    this.data.feedHasMore = false; 
                    document.getElementById('feed-end').classList.remove('hidden');
                }
            } else {
                this.data.feedHasMore = false;
                document.getElementById('feed-end').classList.remove('hidden');
            }
        } catch (e) { 
            console.error("Feed Error:", e); 
        } finally { 
            this.data.feedLoading = false; 
            document.getElementById('feed-loader').classList.add('hidden'); 
        }
    },

    renderFeedChunk(items) {
        const container = document.getElementById('feed-content');
        const getGradient = (id) => ['from-blue-900 via-slate-900 to-black','from-indigo-900 via-purple-900 to-black','from-emerald-900 via-teal-900 to-black','from-rose-900 via-pink-900 to-black','from-amber-900 via-orange-900 to-black'][Math.abs(String(id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 5];
        
        const html = items.map((item, i) => { 
            const isLiked = this.data.likes[item.id]; 
            const baseLikes = Math.abs(String(item.id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 150; 
            const displayLikes = isLiked ? baseLikes + 1 : baseLikes; 
            
            return `
            <div class="feed-item bg-gradient-to-br ${getGradient(item.id)} group shadow-2xl border-b border-white/5 md:border md:border-white/5">
                <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 20px 20px;"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent pointer-events-none"></div>
                
                <div class="absolute top-4 right-4 flex gap-2 z-20">
                    <button onclick="app.toggleLike(this, '${item.id}')" class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center ${isLiked ? 'text-red-500' : 'text-white/70'} hover:text-red-500 hover:bg-white/20 transition active:scale-90 border border-white/10">
                        <i class="${isLiked ? 'fas' : 'far'} fa-heart text-sm"></i>
                    </button>
                    <button onclick="app.shareItem('${item.title.replace(/'/g, "\\'")}', '${item.id}')" class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center text-white/70 hover:text-accent hover:bg-white/20 transition active:scale-90 border border-white/10">
                        <i class="fas fa-share-alt text-sm"></i>
                    </button>
                </div>

                <div class="relative z-10 flex flex-col justify-end h-full fade-up" style="animation-delay: ${i * 0.05}s">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-2.5 py-0.5 rounded-full bg-white/10 backdrop-blur border border-white/10 text-[10px] font-bold text-white uppercase tracking-wider">#${item.tag}</span>
                        <span class="text-white/50 text-[10px] font-medium">${item.date} • ${item.source}</span>
                    </div>
                    <h2 class="text-2xl md:text-4xl font-extrabold text-white leading-[1.15] mb-3 drop-shadow-lg tracking-tight pr-12">${item.title}</h2>
                    <p class="text-base md:text-lg text-gray-200 mb-5 line-clamp-3 drop-shadow-md font-light leading-relaxed max-w-lg">${item.body}</p>
                    
                    <div class="flex items-center gap-3">
                        <button onclick="app.openReader('${item.id}')" class="self-start inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wide hover:bg-accent hover:border-accent transition-all duration-300 group/btn">
                            <span>Читать полностью</span>
                            <i class="fas fa-arrow-right text-[10px] group-hover/btn:translate-x-1 transition-transform"></i>
                        </button>
                        <span class="text-xs text-white/40 font-medium">${displayLikes} ❤️</span>
                    </div>
                </div>
            </div>
        `}).join('');
        container.insertAdjacentHTML('beforeend', html);
    },

    toggleReaderTheme() { const p = document.getElementById('reader-paper'); const i = document.getElementById('theme-icon'); this.data.readerTheme = this.data.readerTheme === 'light' ? 'dark' : 'light'; p.className = `reader-paper ${this.data.readerTheme}`; i.className = this.data.readerTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun'; localStorage.setItem('ip_reader_theme', this.data.readerTheme); },
    toggleAdmin() { this.nav('admin'); },
    login() { if(document.getElementById('adm-pass').value === 'admin') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-editor').classList.remove('hidden'); } else alert('Неверный пароль'); },
    addNews() {
        const title = document.getElementById('new-title').value; const body = document.getElementById('new-body').value; const type = document.getElementById('new-tag').value;
        if(!title || !body) return alert('Заполните все поля');
        const newItem = { id: Date.now(), title, body: body.substring(0, 150) + '...', full: `<p>${body.replace(/\n/g, '</p><p>')}</p>`, tag: type === 'idea' ? 'Мнение' : 'Новости', source: 'Автор', date: 'Только что', isPost: type === 'idea', sourceUrl: '#' };
        if(type === 'idea') { this.data.posts.unshift(newItem); localStorage.setItem('ip_posts_v11', JSON.stringify(this.data.posts)); this.renderIdeas(); } 
        else { this.data.news.unshift(newItem); this.data.allFetchedNews.unshift(newItem); this.renderFeedChunk([newItem]); }
        this.rebuildIndex(); this.renderClassic(); document.getElementById('new-title').value = ''; document.getElementById('new-body').value = ''; alert('Опубликовано!'); this.nav(type === 'idea' ? 'ideas' : 'feed');
    },
    renderClassic() {
        document.getElementById('classic-news-list').innerHTML = this.data.news.slice(0,6).map(n => `<div onclick="app.openReader('${n.id}')" class="bg-card/50 hover:bg-card border border-white/5 hover:border-accent/30 rounded-xl p-5 cursor-pointer transition-all group"><div class="flex justify-between mb-2"><span class="text-xs font-bold text-accent bg-accent/10 px-2 py-1 rounded">${n.tag}</span><span class="text-xs text-gray-500">${n.date}</span></div><h3 class="text-lg font-bold text-white group-hover:text-accent transition mb-2">${n.title}</h3><p class="text-sm text-gray-400 line-clamp-2">${n.body}</p></div>`).join('');
        document.getElementById('sidebar-ideas').innerHTML = this.data.posts.slice(0,3).map(p => `<div onclick="app.openReader('${p.id}')" class="flex gap-4 items-start cursor-pointer group p-3 rounded-lg hover:bg-white/5 transition"><div class="w-10 h-10 rounded bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white shrink-0"><i class="fas fa-pen-nib text-xs"></i></div><div><h4 class="font-bold text-gray-200 group-hover:text-accent transition text-sm">${p.title}</h4><span class="text-xs text-gray-500">${p.date}</span></div></div>`).join('');
    },
    renderIdeas() { document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `<div onclick="app.openReader('${p.id}')" class="border-b border-white/10 pb-8 cursor-pointer group"><div class="text-xs font-bold text-purple-400 uppercase tracking-wider mb-3">Мнение автора • ${p.date}</div><h3 class="text-2xl font-bold text-white mb-3 group-hover:text-accent transition">${p.title}</h3><p class="text-gray-400 line-clamp-3 mb-4">${p.body}</p><span class="text-sm text-accent font-medium group-hover:underline">Читать статью →</span></div>`).join(''); },
    closeReader() { document.getElementById('reader-modal').classList.add('hidden'); document.getElementById('reading-progress').classList.add('hidden'); document.body.style.overflow = ''; this.data.currentItem = null; }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>

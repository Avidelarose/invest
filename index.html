<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro | Infinite Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1120', darker: '#020617', card: '#1e293b',
                        accent: '#3b82f6', up: '#10b981', down: '#ef4444', donate: '#f59e0b'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
    
    <style>
        /* ПРЕЛОАДЕР */
        #app-preloader {
            position: fixed; inset: 0; z-index: 9999; background-color: #0b1120;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #app-preloader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }
        .preloader-spinner {
            width: 48px; height: 48px; border: 4px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ЛЕНТА */
        .feed-container { overflow-y: auto; height: calc(100vh - 64px); scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .feed-item { 
            min-height: 85vh; padding: 1.5rem; margin-bottom: 0; border-radius: 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            justify-content: flex-end; position: relative; overflow: hidden;
        }
        @media (min-width: 768px) {
            .feed-container { padding: 2rem; background: #020617; }
            .feed-item { max-width: 600px; margin: 0 auto 1.5rem auto; min-height: 500px; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); padding: 2rem; }
        }

        /* АНИМАЦИИ */
        .fade-up { animation: fadeUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .glass-header { backdrop-filter: blur(16px); background: rgba(11, 17, 32, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* РИДЕР: СВЕТЛАЯ И ТЕМНАЯ ТЕМА */
        .reader-overlay { position: fixed; inset: 0; z-index: 100; overflow-y: auto; }
        .reader-paper { font-family: 'Merriweather', serif; line-height: 1.9; min-height: 100vh; padding-bottom: 4rem; transition: background 0.3s, color 0.3s; }
        .reader-header { position: sticky; top: 0; backdrop-filter: blur(12px); z-index: 10; transition: background 0.3s, border-color 0.3s; }
        
        /* Светлая */
        .reader-paper.light { background: #fdfbf7; color: #2d3748; }
        .reader-paper.light .prose-reader p { color: #4a5568; }
        .reader-paper.light .prose-reader h2 { color: #1a202c; }
        .reader-paper.light .prose-reader blockquote { background: #edf2f7; border-left-color: #3b82f6; color: #4a5568; }
        .reader-paper.light .reader-header { background: rgba(253, 251, 247, 0.95); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .reader-paper.light .reader-btn { background: white; border-color: #e2e8f0; color: #4a5568; }
        .reader-paper.light .reader-btn:hover { background: #f7fafc; border-color: #cbd5e0; }
        .reader-paper.light .meta-tag { background: rgba(0,0,0,0.06); color: #4a5568; }
        
        /* Темная */
        .reader-paper.dark { background: #1a202c; color: #cbd5e1; }
        .reader-paper.dark .prose-reader p { color: #a0aec0; }
        .reader-paper.dark .prose-reader h2 { color: #f7fafc; }
        .reader-paper.dark .prose-reader blockquote { background: #2d3748; border-left-color: #63b3ed; color: #a0aec0; }
        .reader-paper.dark .reader-header { background: rgba(26, 32, 44, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reader-paper.dark .reader-btn { background: #2d3748; border-color: #4a5568; color: #e2e8f0; }
        .reader-paper.dark .reader-btn:hover { background: #4a5568; border-color: #718096; }
        .reader-paper.dark .meta-tag { background: rgba(255,255,255,0.08); color: #a0aec0; }

        /* Типографика */
        .prose-reader { max-width: 65ch; margin: 0 auto; padding: 2rem 1.5rem; }
        .prose-reader p { margin-bottom: 1.8em; font-size: 1.125rem; }
        .prose-reader h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.5rem; margin-top: 2.5em; margin-bottom: 1em; letter-spacing: -0.02em; }
        .prose-reader strong { font-weight: 700; }
        .prose-reader blockquote { padding: 1.5em; margin: 2em 0; border-radius: 0 8px 8px 0; font-style: italic; border-left-width: 4px; }
        .prose-reader a { color: #3b82f6; text-decoration: underline; text-underline-offset: 4px; }
        
        @media (max-width: 640px) {
            .prose-reader { padding: 1.5rem 1rem; }
            .prose-reader p { font-size: 1.05rem; line-height: 1.8; }
            .prose-reader h2 { font-size: 1.35rem; }
        }

        .reader-progress { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; z-index: 200; width: 0%; transition: width 0.1s; }
        .feed-loader { padding: 2rem; text-align: center; color: #64748b; font-size: 0.875rem; }
        
        /* Уведомление (Toast) */
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 0.75rem 1.5rem; border-radius: 999px;
            font-size: 0.875rem; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 9999; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* Анимация лайка */
        @keyframes likePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .like-animate { animation: likePop 0.3s ease-out; }
    </style>
</head>
<body class="bg-dark text-gray-300 antialiased h-screen flex flex-col overflow-hidden selection:bg-accent selection:text-white">

    <!-- ПРЕЛОАДЕР -->
    <div id="app-preloader">
        <div class="preloader-spinner"></div>
        <p style="color:#94a3b8; margin-top:1.5rem; font-family:'Inter',sans-serif; font-size:.875rem; letter-spacing:.1em; text-transform:uppercase; font-weight:600;">
            Загрузка InvestPro...
        </p>
    </div>

    <!-- ТОСТ УВЕДОМЛЕНИЕ -->
    <div id="toast"><i class="fas fa-check-circle mr-2 text-accent"></i><span id="toast-msg">Скопировано!</span></div>

    <div id="reading-progress" class="reader-progress hidden"></div>

    <!-- ШАПКА -->
    <header class="glass-header h-16 flex items-center justify-between px-4 md:px-8 z-50 shrink-0">
        <div onclick="app.nav('main')" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-accent to-blue-500 flex items-center justify-center text-white text-xs shadow-lg shadow-accent/20"><i class="fas fa-chart-line"></i></div>
            <span class="text-lg font-bold text-white tracking-tight">Invest<span class="text-accent">Pro</span></span>
        </div>
        <nav class="hidden md:flex items-center gap-1 bg-white/5 p-1 rounded-full border border-white/5">
            <button onclick="app.nav('main')" id="btn-main" class="nav-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-accent text-white shadow-lg shadow-accent/25">Главная</button>
            <button onclick="app.nav('feed')" id="btn-feed" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Лента</button>
            <button onclick="app.nav('ideas')" id="btn-ideas" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Мнения</button>
        </nav>
        <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition border border-white/5"><i class="fas fa-cog text-xs"></i></button>
    </header>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <main class="flex-grow relative w-full bg-black overflow-hidden">
        
        <!-- БЕСКОНЕЧНАЯ ЛЕНТА -->
        <section id="view-feed" class="absolute inset-0 feed-container bg-dark hidden">
            <div id="feed-content"></div>
            <div id="feed-loader" class="feed-loader hidden"><i class="fas fa-circle-notch fa-spin mr-2"></i>Загрузка новостей...</div>
            <div id="feed-end" class="feed-loader hidden">Вы просмотрели все доступные новости</div>
        </section>

        <!-- ГЛАВНАЯ -->
        <section id="view-main" class="absolute inset-0 overflow-y-auto p-4 md:p-8 space-y-8 bg-dark hidden">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3"><span class="w-1 h-8 bg-yellow-500 rounded-full"></span> Главное за сегодня</h2>
                <div id="classic-news-list" class="grid md:grid-cols-2 gap-4"></div>
                <div class="mt-12 pt-8 border-t border-white/10">
                    <h3 class="text-xl font-bold text-white mb-6">Авторская аналитика</h3>
                    <div id="sidebar-ideas" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <!-- МНЕНИЯ -->
        <section id="view-ideas" class="absolute inset-0 overflow-y-auto p-4 md:p-8 bg-dark hidden">
            <div class="max-w-3xl mx-auto">
                <h2 class="text-3xl font-bold text-white mb-8 border-b border-white/10 pb-4">Мнения и Идеи</h2>
                <div id="ideas-list" class="space-y-8"></div>
            </div>
        </section>

        <!-- АДМИНКА -->
        <section id="view-admin" class="absolute inset-0 overflow-y-auto p-4 bg-dark z-50 hidden">
            <div class="max-w-lg mx-auto bg-card p-8 rounded-2xl border border-white/10 shadow-2xl mt-10">
                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="fas fa-user-shield text-accent"></i> Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white focus:border-accent outline-none" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent hover:bg-blue-600 py-3 rounded-lg font-bold text-white transition">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-6">
                    <select id="new-tag" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white outline-none">
                        <option value="news">Короткая новость (в ленту)</option>
                        <option value="idea">Статья / Мнение</option>
                    </select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-darker border-b border-white/10 text-xl font-bold text-white py-3 outline-none focus:border-accent transition">
                    <textarea id="new-body" rows="8" placeholder="Полный текст..." class="w-full bg-darker border border-white/10 rounded-lg p-4 font-mono text-sm text-gray-300 outline-none focus:border-accent transition"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold text-white transition shadow-lg shadow-emerald-900/20 flex items-center justify-center gap-2"><i class="fas fa-paper-plane"></i> Опубликовать</button>
                </div>
            </div>
        </section>
    </main>

    <!-- РИДЕР -->
    <div id="reader-modal" class="reader-overlay hidden">
        <div id="reader-paper" class="reader-paper light">
            <div class="reader-header px-4 py-3 flex justify-between items-center font-sans">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-current opacity-70 hover:opacity-100 transition font-bold text-sm px-3 py-1.5 rounded-lg hover:bg-black/5">
                    <i class="fas fa-arrow-left"></i> <span class="hidden sm:inline">Назад</span>
                </button>
                <div class="flex items-center gap-3">
                    <button onclick="app.toggleReaderTheme()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/5 transition text-current opacity-70 hover:opacity-100" title="Сменить тему">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                    <span class="text-[10px] opacity-50 uppercase tracking-widest font-bold hidden sm:block">InvestPro Reader</span>
                </div>
            </div>
            <article id="reader-content" class="prose-reader"></article>
            <div class="max-w-[65ch] mx-auto px-6 pb-20 border-t border-current/10 mt-12 pt-8 font-sans">
                <p class="text-sm opacity-60 mb-4">Понравился материал?</p>
                <div class="flex gap-3">
                    <button id="reader-like-btn" onclick="app.handleReaderLike()" class="reader-btn flex-1 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-sm border">
                        <i class="fas fa-heart"></i> <span id="reader-like-text">Нравится</span>
                    </button>
                    <button id="reader-share-btn" onclick="app.handleReaderShare()" class="reader-btn flex-1 py-3 rounded-xl font-bold transition shadow-lg border">
                        <i class="fas fa-share-alt mr-2"></i> Поделиться
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { 
        news: [], posts: [], feedPage: 0, feedLoading: false, feedHasMore: true, allFetchedNews: [],
        readerTheme: localStorage.getItem('ip_reader_theme') || 'light',
        likes: JSON.parse(localStorage.getItem('ip_likes') || '{}'),
        currentItem: null // Текущая открытая новость
    },

    rssSources: [
        "https://news.google.com/rss/search?q=инвестиции+акции+мосбиржа&hl=ru&gl=RU&ceid=RU:ru",
        "https://news.google.com/rss/search?q=криптовалюта+биткоин+блокчейн&hl=ru&gl=RU&ceid=RU:ru",
        "https://news.google.com/rss/search?q=центробанк+ключевая+ставка+макроэкономика&hl=ru&gl=RU&ceid=RU:ru",
        "https://news.google.com/rss/search?q=нефть+газ+сырье+экспорт&hl=ru&gl=RU&ceid=RU:ru",
        "https://news.google.com/rss/search?q=дивиденды+отчетность+прибыль&hl=ru&gl=RU&ceid=RU:ru"
    ],

    init() {
        const savedPosts = localStorage.getItem('ip_posts_v7');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку прямо сейчас", body: "Многие боятся рецессии, но я вижу точку входа.", full: "<p>Многие боятся рецессии, но я вижу отличную точку входа. Энергетический кризис только начинается.</p><p>Текущие цены на нефть не отражают реальный дефицит предложения.</p>", tag: "Мнение", date: "2ч назад", isPost: true }
        ];

        this.data.news = [
            { id: 1, title: "Сбербанк бьет рекорды по прибыли", body: "Чистая прибыль за квартал превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность. Чистая прибыль превысила прогнозы на 15%.</p><h2>Что это значит?</h2><p>Банк может направить на дивиденды до 50% прибыли.</p>", tag: "Акции", source: "РБК", date: "1ч назад" },
            { id: 2, title: "Биткоин пробил отметку $70,000", body: "Криптовалюта обновила исторический максимум.", full: "<p>Рынок криптовалют ликует. Биткоин преодолел психологическую отметку в $70k.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч назад" },
            { id: 3, title: "ЦБ сохранил ключевую ставку", body: "Регулятор сохранил жесткую риторику.", full: "<p>Эльвира Набиуллина заявила о необходимости сохранения жесткой ДКП.</p>", tag: "Макро", source: "Интерфакс", date: "5ч назад" }
        ];

        this.renderClassic();
        this.renderIdeas();
        this.nav('main');
        
        const feedContainer = document.getElementById('view-feed');
        feedContainer.addEventListener('scroll', () => {
            if (this.data.currentView !== 'feed') return;
            const { scrollTop, scrollHeight, clientHeight } = feedContainer;
            if (scrollTop + clientHeight >= scrollHeight - 300 && !this.data.feedLoading && this.data.feedHasMore) {
                this.loadMoreFeed();
            }
        });

        setTimeout(() => document.getElementById('app-preloader')?.classList.add('loaded'), 800);
    },

    nav(view) {
        this.data.currentView = view;
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`)?.classList.remove('hidden');
        
        document.querySelectorAll('.nav-btn').forEach(b => b.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all');
        const activeBtn = document.getElementById(`btn-${view}`);
        if(activeBtn) activeBtn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-bold bg-accent text-white shadow-lg shadow-accent/25 transition-all';
        
        if(view === 'feed' && this.data.allFetchedNews.length === 0) this.loadMoreFeed();
    },

    showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    },

    // --- РАБОЧИЕ ЛАЙКИ ---
    toggleLike(btn, id) {
        if (!id) return;
        const isLiked = this.data.likes[id];
        
        if (isLiked) {
            delete this.data.likes[id];
            btn.classList.remove('text-red-500');
            btn.querySelector('i').classList.replace('fas', 'far');
        } else {
            this.data.likes[id] = true;
            btn.classList.add('text-red-500');
            btn.querySelector('i').classList.replace('far', 'fas');
            btn.querySelector('i').classList.add('like-animate');
            setTimeout(() => btn.querySelector('i').classList.remove('like-animate'), 300);
        }
        
        localStorage.setItem('ip_likes', JSON.stringify(this.data.likes));
        
        // Обновляем счетчик если он есть
        const counter = btn.parentElement.querySelector('.like-counter');
        if (counter) {
            let count = parseInt(counter.dataset.baseCount || counter.innerText);
            if (!counter.dataset.baseCount) counter.dataset.baseCount = count;
            counter.innerText = isLiked ? count : count + 1;
        }
    },

    // --- РАБОЧИЙ ШЕРИНГ ---
    async shareItem(title, id) {
        const url = `${window.location.origin}${window.location.pathname}?news=${id}`;
        const shareData = { title: `InvestPro: ${title}`, text: `Читай на InvestPro: ${title}`, url: url };

        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                await navigator.clipboard.writeText(url);
                this.showToast('Ссылка скопирована в буфер!');
            }
        } catch (err) {
            // Пользователь отменил шеринг или ошибка
            if (err.name !== 'AbortError') {
                console.error('Share error:', err);
                this.showToast('Не удалось поделиться');
            }
        }
    },

    handleReaderLike() {
        if (!this.data.currentItem) return;
        const btn = document.getElementById('reader-like-btn');
        this.toggleLike(btn, this.data.currentItem.id);
    },

    handleReaderShare() {
        if (!this.data.currentItem) return;
        this.shareItem(this.data.currentItem.title, this.data.currentItem.id);
    },

    // --- БЕСКОНЕЧНАЯ ЛЕНТА ---
    async loadMoreFeed() {
        if (this.data.feedLoading || !this.data.feedHasMore) return;
        this.data.feedLoading = true;
        document.getElementById('feed-loader').classList.remove('hidden');

        try {
            if (this.data.allFetchedNews.length < 50) {
                const promises = this.rssSources.map(url => 
                    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`)
                        .then(r => r.text())
                        .then(xml => {
                            const doc = new DOMParser().parseFromString(xml, "text/xml");
                            return Array.from(doc.querySelectorAll("item")).map(item => ({
                                id: 'rss_' + Math.random().toString(36).substr(2, 9),
                                title: item.querySelector("title")?.textContent || "",
                                body: (item.querySelector("description")?.textContent || "").replace(/<[^>]*>/g, '').substring(0, 200),
                                full: item.querySelector("description")?.textContent || "",
                                source: item.querySelector("source")?.textContent || "Google News",
                                date: new Date(item.querySelector("pubDate")?.textContent || Date.now()).toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}),
                                tag: ["Акции","Крипто","Макро","Сырье","Отчеты"][Math.floor(Math.random()*5)]
                            }));
                        })
                        .catch(() => [])
                );
                const results = await Promise.all(promises);
                this.data.allFetchedNews = [...this.data.allFetchedNews, ...results.flat()];
                this.data.allFetchedNews = this.data.allFetchedNews.filter((v,i,a) => a.findIndex(t => t.title === v.title) === i);
            }

            const start = this.data.feedPage * 10;
            const end = start + 10;
            const chunk = this.data.allFetchedNews.slice(start, end);

            if (chunk.length > 0) {
                this.renderFeedChunk(chunk);
                this.data.feedPage++;
            } else {
                this.data.feedHasMore = false;
                document.getElementById('feed-end').classList.remove('hidden');
            }
        } catch (e) { console.error(e); } 
        finally {
            this.data.feedLoading = false;
            document.getElementById('feed-loader').classList.add('hidden');
        }
    },

    renderFeedChunk(items) {
        const container = document.getElementById('feed-content');
        const getGradient = (id) => ['from-blue-900 via-slate-900 to-black','from-indigo-900 via-purple-900 to-black','from-emerald-900 via-teal-900 to-black','from-rose-900 via-pink-900 to-black','from-amber-900 via-orange-900 to-black'][Math.abs(id.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 5];

        const html = items.map((item, i) => {
            const isLiked = this.data.likes[item.id];
            const baseLikes = Math.floor(Math.random() * 500) + 10;
            const displayLikes = isLiked ? baseLikes + 1 : baseLikes;
            
            return `
            <div class="feed-item bg-gradient-to-br ${getGradient(item.id)} group shadow-2xl border-b border-white/5 md:border md:border-white/5">
                <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 20px 20px;"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent pointer-events-none"></div>
                
                <!-- Кнопки действий -->
                <div class="absolute top-4 right-4 flex gap-2 z-20">
                    <button onclick="app.toggleLike(this, '${item.id}')" class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center ${isLiked ? 'text-red-500' : 'text-white/70'} hover:text-red-500 hover:bg-white/20 transition active:scale-90 border border-white/10">
                        <i class="${isLiked ? 'fas' : 'far'} fa-heart text-sm"></i>
                    </button>
                    <button onclick="app.shareItem('${item.title.replace(/'/g, "\\'")}', '${item.id}')" class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center text-white/70 hover:text-accent hover:bg-white/20 transition active:scale-90 border border-white/10">
                        <i class="fas fa-share-alt text-sm"></i>
                    </button>
                </div>

                <div class="relative z-10 flex flex-col justify-end h-full fade-up" style="animation-delay: ${i * 0.05}s">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="px-2.5 py-0.5 rounded-full bg-white/10 backdrop-blur border border-white/10 text-[10px] font-bold text-white uppercase tracking-wider">#${item.tag}</span>
                        <span class="text-white/50 text-[10px] font-medium">${item.date} • ${item.source}</span>
                    </div>
                    <h2 class="text-2xl md:text-4xl font-extrabold text-white leading-[1.15] mb-3 drop-shadow-lg tracking-tight pr-12">${item.title}</h2>
                    <p class="text-base md:text-lg text-gray-200 mb-5 line-clamp-3 drop-shadow-md font-light leading-relaxed max-w-lg">${item.body}</p>
                    
                    <div class="flex items-center gap-3">
                        <button onclick='app.openReaderFromFeed(${JSON.stringify(item).replace(/'/g, "&#39;")})' class="self-start inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-wide hover:bg-accent hover:border-accent transition-all duration-300 group/btn">
                            <span>Читать полностью</span>
                            <i class="fas fa-arrow-right text-[10px] group-hover/btn:translate-x-1 transition-transform"></i>
                        </button>
                        <span class="like-counter text-xs text-white/40 font-medium" data-base-count="${baseLikes}">${displayLikes} ❤️</span>
                    </div>
                </div>
            </div>
        `}).join('');
        container.insertAdjacentHTML('beforeend', html);
    },

    openReaderFromFeed(item) {
        this.data.currentItem = item;
        const modal = document.getElementById('reader-modal');
        const paper = document.getElementById('reader-paper');
        const content = document.getElementById('reader-content');
        const progress = document.getElementById('reading-progress');
        const themeIcon = document.getElementById('theme-icon');
        const likeBtn = document.getElementById('reader-like-btn');

        // Тема
        paper.className = `reader-paper ${this.data.readerTheme}`;
        themeIcon.className = this.data.readerTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';

        // Состояние лайка в ридере
        const isLiked = this.data.likes[item.id];
        likeBtn.className = `reader-btn flex-1 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-sm border ${isLiked ? 'text-red-500 border-red-200 bg-red-50' : ''}`;
        likeBtn.querySelector('i').className = `${isLiked ? 'fas' : 'far'} fa-heart`;

        content.innerHTML = `
            <div class="font-sans text-xs opacity-50 uppercase tracking-widest mb-6 flex items-center gap-3">
                <span class="meta-tag px-2 py-1 rounded font-bold">${item.tag}</span>
                <span>${item.source} • ${item.date}</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold mb-8 leading-tight font-sans">${item.title}</h1>
            <div class="mb-10">${item.full || item.body}</div>
        `;

        modal.classList.remove('hidden');
        progress.classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        modal.onscroll = () => {
            const winScroll = modal.scrollTop;
            const height = modal.scrollHeight - modal.clientHeight;
            progress.style.width = (height > 0 ? (winScroll / height) * 100 : 0) + "%";
        };
    },

    toggleReaderTheme() {
        const paper = document.getElementById('reader-paper');
        const icon = document.getElementById('theme-icon');
        
        if (this.data.readerTheme === 'light') {
            this.data.readerTheme = 'dark';
            paper.classList.replace('light', 'dark');
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            this.data.readerTheme = 'light';
            paper.classList.replace('dark', 'light');
            icon.classList.replace('fa-sun', 'fa-moon');
        }
        localStorage.setItem('ip_reader_theme', this.data.readerTheme);
    },

    toggleAdmin() { this.nav('admin'); },
    login() {
        if(document.getElementById('adm-pass').value === 'admin') {
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('admin-editor').classList.remove('hidden');
        } else alert('Неверный пароль');
    },
    addNews() {
        const title = document.getElementById('new-title').value;
        const body = document.getElementById('new-body').value;
        const type = document.getElementById('new-tag').value;
        if(!title || !body) return alert('Заполните все поля');

        const newItem = {
            id: Date.now(), title, body: body.substring(0, 150) + '...', 
            full: `<p>${body.replace(/\n/g, '</p><p>')}</p>`,
            tag: type === 'idea' ? 'Мнение' : 'Новости', source: 'Автор', date: 'Только что', isPost: type === 'idea'
        };

        if(type === 'idea') {
            this.data.posts.unshift(newItem);
            localStorage.setItem('ip_posts_v7', JSON.stringify(this.data.posts));
            this.renderIdeas();
        } else {
            this.data.news.unshift(newItem);
            this.data.allFetchedNews.unshift(newItem);
            this.renderFeedChunk([newItem]); 
        }
        this.renderClassic();
        document.getElementById('new-title').value = '';
        document.getElementById('new-body').value = '';
        alert('Опубликовано!');
        this.nav(type === 'idea' ? 'ideas' : 'feed');
    },
    renderClassic() {
        document.getElementById('classic-news-list').innerHTML = this.data.news.slice(0,6).map(n => `
            <div onclick="app.openReaderFromFeed(${JSON.stringify(n).replace(/'/g, "&#39;")})" class="bg-card/50 hover:bg-card border border-white/5 hover:border-accent/30 rounded-xl p-5 cursor-pointer transition-all group">
                <div class="flex justify-between mb-2"><span class="text-xs font-bold text-accent bg-accent/10 px-2 py-1 rounded">${n.tag}</span><span class="text-xs text-gray-500">${n.date}</span></div>
                <h3 class="text-lg font-bold text-white group-hover:text-accent transition mb-2">${n.title}</h3>
                <p class="text-sm text-gray-400 line-clamp-2">${n.body}</p>
            </div>
        `).join('');
        document.getElementById('sidebar-ideas').innerHTML = this.data.posts.slice(0,3).map(p => `
            <div onclick="app.openReaderFromFeed(${JSON.stringify(p).replace(/'/g, "&#39;")})" class="flex gap-4 items-start cursor-pointer group p-3 rounded-lg hover:bg-white/5 transition">
                <div class="w-10 h-10 rounded bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white shrink-0"><i class="fas fa-pen-nib text-xs"></i></div>
                <div><h4 class="font-bold text-gray-200 group-hover:text-accent transition text-sm">${p.title}</h4><span class="text-xs text-gray-500">${p.date}</span></div>
            </div>
        `).join('');
    },
    renderIdeas() {
        document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `
            <div onclick="app.openReaderFromFeed(${JSON.stringify(p).replace(/'/g, "&#39;")})" class="border-b border-white/10 pb-8 cursor-pointer group">
                <div class="text-xs font-bold text-purple-400 uppercase tracking-wider mb-3">Мнение автора • ${p.date}</div>
                <h3 class="text-2xl font-bold text-white mb-3 group-hover:text-accent transition">${p.title}</h3>
                <p class="text-gray-400 line-clamp-3 mb-4">${p.body}</p>
                <span class="text-sm text-accent font-medium group-hover:underline">Читать статью →</span>
            </div>
        `).join('');
    },
    closeReader() {
        document.getElementById('reader-modal').classList.add('hidden');
        document.getElementById('reading-progress').classList.add('hidden');
        document.body.style.overflow = '';
        this.data.currentItem = null;
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestPro | TikTok News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1120', card: '#1e293b', accent: '#3b82f6', 
                        up: '#10b981', down: '#ef4444', reader: '#fdfbf7'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
    <style>
        /* Скрытие скроллбара для тикток-ленты */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Плавная привязка к карточкам (Scroll Snap) */
        .snap-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: calc(100vh - 100px); }
        .snap-item { scroll-snap-align: start; height: calc(100vh - 100px); }
        
        /* Анимации */
        .fade-up { animation: fadeUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        
        /* Ридер */
        .reader-mode { background: #fdfbf7; color: #333; font-family: 'Merriweather', serif; line-height: 1.8; }
    </style>
</head>
<body class="bg-dark text-gray-300 antialiased h-screen flex flex-col overflow-hidden">

    <!-- ШАПКА (Компактная) -->
    <header class="h-16 bg-dark/90 backdrop-blur border-b border-white/5 flex items-center justify-between px-4 z-40 shrink-0">
        <div onclick="app.nav('main')" class="font-bold text-white cursor-pointer">Invest<span class="text-accent">Pro</span></div>
        <nav class="flex gap-4 text-xs font-bold uppercase tracking-wider">
            <button onclick="app.nav('main')" class="hover:text-accent transition">Главная</button>
            <button onclick="app.nav('feed')" class="text-accent transition">Лента</button>
            <button onclick="app.nav('ideas')" class="hover:text-accent transition">Мнения</button>
        </nav>
        <button onclick="app.toggleAdmin()" class="text-gray-500 hover:text-white"><i class="fas fa-cog"></i></button>
    </header>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <main class="flex-grow relative w-full max-w-md mx-auto md:max-w-full bg-black">
        
        <!-- ВИД: TIKTOK ЛЕНТА -->
        <section id="view-feed" class="absolute inset-0 snap-container no-scrollbar bg-dark">
            <!-- Карточки генерируются JS -->
        </section>

        <!-- ВИД: ГЛАВНАЯ (Классическая) -->
        <section id="view-main" class="hidden absolute inset-0 overflow-y-auto p-4 space-y-4 bg-dark">
            <h2 class="text-xl font-bold text-white mb-4">Популярное сейчас</h2>
            <div id="classic-news-list" class="space-y-3"></div>
            <div class="pt-4 border-t border-white/10">
                <h3 class="font-bold text-white mb-3">Авторские идеи</h3>
                <div id="sidebar-ideas" class="space-y-3"></div>
            </div>
        </section>

        <!-- ВИД: МНЕНИЯ -->
        <section id="view-ideas" class="hidden absolute inset-0 overflow-y-auto p-4 bg-dark">
            <h2 class="text-2xl font-bold text-white mb-6">Аналитика</h2>
            <div id="ideas-list" class="space-y-6"></div>
        </section>

        <!-- ВИД: АДМИНКА -->
        <section id="view-admin" class="hidden absolute inset-0 overflow-y-auto p-4 bg-dark z-50">
            <div class="max-w-lg mx-auto bg-card p-6 rounded-xl border border-white/10">
                <h2 class="text-xl font-bold text-white mb-4">Новая короткая новость</h2>
                <input type="text" id="new-title" placeholder="Заголовок (макс 60 зн.)" class="w-full bg-darker p-3 rounded mb-3 text-white border border-white/10">
                <textarea id="new-body" rows="4" placeholder="Суть новости (коротко)" class="w-full bg-darker p-3 rounded mb-3 text-white border border-white/10"></textarea>
                <select id="new-tag" class="w-full bg-darker p-3 rounded mb-4 text-white border border-white/10">
                    <option value="news">Новость</option>
                    <option value="idea">Идея</option>
                </select>
                <button onclick="app.addNews()" class="w-full bg-accent py-3 rounded font-bold text-white">Добавить в ленту</button>
            </div>
        </section>

    </main>

    <!-- МОДАЛКА РИДЕРА -->
    <div id="reader-modal" class="fixed inset-0 z-[100] hidden bg-dark overflow-y-auto">
        <div class="min-h-screen reader-mode">
            <div class="sticky top-0 bg-[#fdfbf7]/95 backdrop-blur border-b border-black/5 px-4 py-3 flex justify-between items-center font-sans z-10">
                <button onclick="document.getElementById('reader-modal').classList.add('hidden')" class="text-gray-500 font-bold text-sm"><i class="fas fa-arrow-left mr-2"></i>Назад</button>
                <span class="text-xs text-gray-400 uppercase">InvestPro Reader</span>
            </div>
            <article id="reader-content" class="max-w-2xl mx-auto px-6 py-12 text-lg"></article>
        </div>
    </div>

<script>
const app = {
    data: {
        news: [
            { id: 1, title: "Сбербанк бьет рекорды", body: "Чистая прибыль за квартал превысила 400 млрд руб. Дивиденды могут быть выше ожиданий.", full: "<p>Сбербанк опубликовал сильную отчетность...</p><p>Аналитики рекомендуют покупать.</p>", tag: "Акции", date: "2ч" },
            { id: 2, title: "Биткоин пробил $70k", body: "Криптовалюта обновила исторический максимум на фоне одобрения ETF.", full: "<p>Рынок криптовалют ликует...</p>", tag: "Крипто", date: "4ч" },
            { id: 3, title: "ЦБ держит ставку", body: "Регулятор сохранил жесткую риторику. Инфляция замедляется медленнее прогнозов.", full: "<p>Эльвира Набиуллина заявила...</p>", tag: "Макро", date: "5ч" },
            { id: 4, title: "Нефть Brent > $85", body: "Геополитика толкает сырье вверх. Экспортеры в плюсе.", full: "<p>ОПЕК+ сокращает добычу...</p>", tag: "Сырье", date: "6ч" }
        ],
        posts: JSON.parse(localStorage.getItem('ip_posts') || '[]')
    },

    init() {
        this.renderFeed();
        this.renderClassic();
        this.renderIdeas();
    },

    nav(view) {
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        if(view === 'feed') this.renderFeed(); // Перерисовка для сброса скролла
    },

    toggleAdmin() { this.nav('admin'); },

    addNews() {
        const t = document.getElementById('new-title').value;
        const b = document.getElementById('new-body').value;
        const type = document.getElementById('new-tag').value;
        if(!t || !b) return alert('Заполните поля');

        const item = { 
            id: Date.now(), title: t, body: b, full: `<p>${b}</p>`, 
            tag: type === 'idea' ? 'Мнение' : 'Новости', date: 'Только что',
            isPost: type === 'idea'
        };

        if(type === 'idea') {
            this.data.posts.unshift(item);
            localStorage.setItem('ip_posts', JSON.stringify(this.data.posts));
            this.renderIdeas();
        } else {
            this.data.news.unshift(item);
            this.renderFeed();
            this.renderClassic();
        }
        alert('Добавлено!');
        this.nav('feed');
    },

    // --- РЕНДЕР TIKTOK ЛЕНТЫ ---
    renderFeed() {
        const container = document.getElementById('view-feed');
        // Объединяем новости и посты для ленты
        const allItems = [...this.data.news, ...this.data.posts.map(p => ({...p, tag: 'Мнение'}))].sort((a,b) => b.id - a.id);

        container.innerHTML = allItems.map((item, index) => `
            <div class="snap-item relative flex flex-col justify-end pb-20 px-6 bg-gradient-to-b from-transparent to-black/90 border-b border-white/5 group">
                <!-- Фоновый градиент или паттерн (в реальном проекте тут видео/фото) -->
                <div class="absolute inset-0 bg-dark z-0">
                    <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-accent/30 via-dark to-dark"></div>
                </div>

                <!-- Боковая панель действий (как в ТикТоке) -->
                <div class="absolute right-4 bottom-24 flex flex-col gap-6 items-center z-20">
                    <button onclick="app.toggleLike(this)" class="flex flex-col items-center gap-1 text-white/70 hover:text-red-500 transition">
                        <i class="fas fa-heart text-2xl drop-shadow-lg"></i>
                        <span class="text-[10px] font-bold">${Math.floor(Math.random() * 500)}</span>
                    </button>
                    <button onclick="app.bookmark(${item.id})" class="flex flex-col items-center gap-1 text-white/70 hover:text-yellow-400 transition">
                        <i class="fas fa-bookmark text-2xl drop-shadow-lg"></i>
                        <span class="text-[10px] font-bold">Save</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white/70 hover:text-accent transition">
                        <i class="fas fa-share-alt text-2xl drop-shadow-lg"></i>
                    </button>
                </div>

                <!-- Контент карточки -->
                <div class="relative z-10 fade-up" style="animation-delay: ${index * 0.1}s">
                    <div class="inline-block px-3 py-1 rounded-full bg-white/10 backdrop-blur border border-white/10 text-xs font-bold text-white mb-4">
                        #${item.tag} • ${item.date}
                    </div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-white leading-tight mb-4 drop-shadow-md">
                        ${item.title}
                    </h2>
                    <p class="text-lg text-gray-200 mb-6 line-clamp-3 drop-shadow-sm">
                        ${item.body}
                    </p>
                    
                    <button onclick='app.openReader(${JSON.stringify(item).replace(/'/g, "&#39;")})' 
                        class="bg-white text-dark px-6 py-3 rounded-full font-bold text-sm hover:bg-accent hover:text-white transition shadow-lg shadow-accent/20 flex items-center gap-2">
                        Читать подробно <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
                
                <!-- Индикатор прогресса (линия справа) -->
                <div class="absolute right-0 top-0 bottom-0 w-1 bg-white/5">
                    <div class="h-full bg-accent/50 w-full"></div>
                </div>
            </div>
        `).join('');
    },

    renderClassic() {
        document.getElementById('classic-news-list').innerHTML = this.data.news.slice(0,5).map(n => `
            <div onclick='app.openReader(${JSON.stringify(n).replace(/'/g, "&#39;")})' class="bg-card p-4 rounded-lg border border-white/5 cursor-pointer hover:border-accent/50 transition">
                <div class="text-xs text-accent mb-1">${n.tag}</div>
                <div class="font-bold text-white">${n.title}</div>
            </div>
        `).join('');
        
        document.getElementById('sidebar-ideas').innerHTML = this.data.posts.slice(0,3).map(p => `
            <div onclick='app.openReader(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="cursor-pointer group">
                <div class="text-sm font-bold text-gray-300 group-hover:text-accent transition">${p.title}</div>
            </div>
        `).join('');
    },

    renderIdeas() {
        document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `
            <div onclick='app.openReader(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="border-b border-white/10 pb-6 cursor-pointer group">
                <h3 class="text-xl font-bold text-white mb-2 group-hover:text-accent transition">${p.title}</h3>
                <p class="text-gray-400 text-sm line-clamp-2">${p.body}</p>
            </div>
        `).join('');
    },

    openReader(item) {
        const modal = document.getElementById('reader-modal');
        const content = document.getElementById('reader-content');
        content.innerHTML = `
            <div class="font-sans text-xs text-gray-500 uppercase tracking-widest mb-6">${item.tag} • ${item.date}</div>
            <h1 class="text-3xl font-bold text-gray-900 mb-8 font-sans">${item.title}</h1>
            <div class="prose prose-lg prose-stone">${item.full || item.body}</div>
        `;
        modal.classList.remove('hidden');
    },

    toggleLike(btn) {
        btn.classList.toggle('text-red-500');
        btn.querySelector('i').classList.toggle('fas'); // В реальном приложении тут логика лайка
    },
    
    bookmark(id) {
        alert('Сохранено в закладки (LocalStorage)');
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>InvestPro | Hybrid Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0b1120', darker: '#020617', card: '#1e293b',
                        accent: '#3b82f6', up: '#10b981', down: '#ef4444', 
                        essence: '#F59E0B', // Цвет для вкладки Суть
                        ios: { gray: '#8E8E93', red: '#FF453A' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b1120; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        /* --- БЕГУЩАЯ СТРОКА --- */
        .ticker-wrap { height: 32px; line-height: 32px; overflow: hidden; background: #111827; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 40s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 1.5rem; font-size: 0.75rem; color: #9ca3af; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- ОБЫЧНАЯ ЛЕНТА (Вертикальная) --- */
        .standard-feed { overflow-y: auto; height: calc(100vh - 96px); /* Header + Ticker */ padding: 1rem; }
        @media (min-width: 768px) { .standard-feed { padding: 2rem; } }

        /* --- СУТЬ / ФАРШ (TikTok Style Mobile / Grid Desktop) --- */
        .essence-scroll-mobile { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; height: calc(100vh - 96px); padding-left: 1rem; }
        .essence-card-mobile { flex: 0 0 90vw; height: 100%; scroll-snap-align: center; margin-right: 1rem; border-radius: 24px; position: relative; overflow: hidden; }
        
        .essence-grid-desktop { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; padding: 2rem; overflow-y: auto; height: calc(100vh - 96px); }
        .essence-card-desktop { height: 500px; border-radius: 20px; position: relative; overflow: hidden; transition: transform 0.2s; display: flex; flex-direction: column; }
        .essence-card-desktop:hover { transform: translateY(-5px); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- UI & MODALS --- */
        .glass-header { backdrop-filter: blur(16px); background: rgba(11, 17, 32, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-bar { backdrop-filter: saturate(180%) blur(20px); background-color: rgba(11, 17, 32, 0.95); border-top: 1px solid rgba(255,255,255,0.05); }
        
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; display: flex; align-items: center; justify-content: center; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .reader-box { width: 100%; height: 100%; overflow-y: auto; transition: all 0.3s; }
        @media (min-width: 768px) { .reader-box { width: 800px; height: 90vh; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); } }

        /* Reader Themes */
        .reader-paper.light { background: #fdfbf7; color: #2d3748; }
        .reader-paper.light .prose-reader p { color: #4a5568; }
        .reader-paper.light .prose-reader h2 { color: #1a202c; }
        .reader-paper.light .reader-header { background: rgba(253, 251, 247, 0.95); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .reader-paper.light .reader-btn { background: white; border-color: #e2e8f0; color: #4a5568; }
        .reader-paper.light .comment-input { background: #f7fafc; border-color: #e2e8f0; color: #2d3748; }
        
        .reader-paper.dark { background: #1a202c; color: #cbd5e1; }
        .reader-paper.dark .prose-reader p { color: #a0aec0; }
        .reader-paper.dark .prose-reader h2 { color: #f7fafc; }
        .reader-paper.dark .reader-header { background: rgba(26, 32, 44, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reader-paper.dark .reader-btn { background: #2d3748; border-color: #4a5568; color: #e2e8f0; }
        .reader-paper.dark .comment-input { background: #1a202c; border-color: #4a5568; color: #e2e8f0; }

        .prose-reader { max-width: 68ch; margin: 0 auto; padding: 2rem 1.5rem; font-family: 'Merriweather', serif; line-height: 1.9; }
        .prose-reader p { margin-bottom: 1.8em; font-size: 1.15rem; }
        .prose-reader h2 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.6rem; margin-top: 2.5em; margin-bottom: 1em; }
        .prose-reader blockquote { border-left: 4px solid #3b82f6; padding: 1em 1.5em; margin: 2em 0; background: rgba(59,130,246,0.1); border-radius: 0 8px 8px 0; font-style: italic; }

        @keyframes likePop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .like-animate { animation: likePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        #toast { position: fixed; bottom: 6rem; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 0.75rem 1.5rem; border-radius: 999px; font-size: 0.875rem; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; border: 1px solid rgba(255,255,255,0.1); }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="text-gray-300 antialiased h-screen flex flex-col selection:bg-accent selection:text-white">

    <!-- TOAST -->
    <div id="toast"><i class="fas fa-check-circle mr-2 text-accent"></i><span id="toast-msg">Готово</span></div>

    <!-- ONBOARDING MODAL (СУТЬ) -->
    <div id="essence-modal" class="modal-overlay z-[110]">
        <div class="bg-card w-[90%] max-w-md p-8 rounded-3xl border border-white/10 shadow-2xl text-center">
            <div class="w-16 h-16 bg-gradient-to-tr from-essence to-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-500/20">
                <i class="fas fa-bolt text-white text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-4">Время — это деньги</h2>
            <p class="text-gray-400 mb-8 leading-relaxed">
                Здесь только <strong class="text-white">сухая выжимка</strong> фактов из 100+ источников. Никакой воды.
                <br><br>
                Листай, читай суть за 5 секунд, переходи к источнику только если нужно.
            </p>
            <button onclick="app.closeEssenceModal()" class="w-full bg-essence hover:bg-orange-500 text-black font-bold py-4 rounded-xl transition active:scale-95">
                Понятно, погнали
            </button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="glass-header h-16 flex items-center justify-between px-4 md:px-8 z-50 shrink-0">
        <div onclick="app.nav('feed')" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-8 h-8 rounded bg-gradient-to-tr from-accent to-blue-500 flex items-center justify-center text-white text-xs shadow-lg shadow-accent/20"><i class="fas fa-chart-line"></i></div>
            <span class="text-lg font-bold text-white tracking-tight">Invest<span class="text-accent">Pro</span></span>
        </div>
        <nav class="hidden md:flex items-center gap-1 bg-white/5 p-1 rounded-full border border-white/5">
            <button onclick="app.nav('feed')" id="btn-feed" class="nav-btn px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-accent text-white shadow-lg shadow-accent/25">Лента</button>
            <button onclick="app.nav('essence')" id="btn-essence" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-essence hover:bg-white/10 transition-all flex items-center gap-1"><i class="fas fa-bolt text-[10px]"></i> Суть</button>
            <button onclick="app.nav('ideas')" id="btn-ideas" class="nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all">Мнения</button>
        </nav>
        <div class="flex items-center gap-3">
            <button onclick="app.showEssenceInfo()" class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center text-gray-400 hover:text-white transition" title="Что такое Суть?"><i class="fas fa-question text-xs"></i></button>
            <button onclick="app.toggleAdmin()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-gray-400 hover:text-white transition"><i class="fas fa-cog text-xs"></i></button>
        </div>
    </header>

    <!-- TICKER -->
    <div class="ticker-wrap shrink-0"><div class="ticker" id="ticker-content"></div></div>

    <!-- MAIN CONTENT -->
    <main class="flex-grow relative w-full overflow-hidden">
        
        <!-- VIEW: STANDARD FEED -->
        <section id="view-feed" class="absolute inset-0 standard-feed bg-dark hidden">
            <div class="max-w-4xl mx-auto space-y-4" id="standard-feed-container"></div>
            <div id="feed-loader" class="py-8 text-center text-gray-500 hidden"><i class="fas fa-circle-notch fa-spin mr-2"></i>Загрузка...</div>
        </section>

        <!-- VIEW: ESSENCE (FARSH) -->
        <section id="view-essence" class="absolute inset-0 bg-dark hidden">
            <!-- Mobile: Horizontal Swipe -->
            <div id="essence-mobile" class="essence-scroll-mobile no-scrollbar md:hidden pl-4"></div>
            <!-- Desktop: Grid -->
            <div id="essence-desktop" class="essence-grid-desktop no-scrollbar hidden md:block"></div>
            
            <div id="essence-loader" class="absolute bottom-8 left-1/2 -translate-x-1/2 text-gray-500 text-sm hidden bg-card px-4 py-2 rounded-full border border-white/10 z-30">
                <i class="fas fa-circle-notch fa-spin mr-2"></i>Анализ...
            </div>
        </section>

        <!-- VIEW: IDEAS -->
        <section id="view-ideas" class="absolute inset-0 standard-feed bg-dark hidden">
            <div class="max-w-3xl mx-auto">
                <h2 class="text-2xl font-bold text-white mb-6 border-l-4 border-purple-500 pl-3">Авторская аналитика</h2>
                <div id="ideas-list" class="space-y-6"></div>
            </div>
        </section>

        <!-- VIEW: ADMIN -->
        <section id="view-admin" class="absolute inset-0 standard-feed bg-dark z-50 hidden">
            <div class="max-w-lg mx-auto bg-card p-8 rounded-2xl border border-white/10 shadow-2xl mt-4">
                <h2 class="text-2xl font-bold text-white mb-6">Редактор</h2>
                <div id="admin-auth" class="space-y-4">
                    <input type="password" id="adm-pass" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white outline-none" placeholder="Пароль (admin)">
                    <button onclick="app.login()" class="w-full bg-accent py-3 rounded-lg font-bold text-white">Войти</button>
                </div>
                <div id="admin-editor" class="hidden space-y-4">
                    <select id="new-tag" class="w-full bg-darker border border-white/10 rounded-lg px-4 py-3 text-white outline-none"><option value="news">Новость</option><option value="idea">Мнение</option></select>
                    <input type="text" id="new-title" placeholder="Заголовок" class="w-full bg-darker border-b border-white/10 text-xl font-bold text-white py-3 outline-none">
                    <textarea id="new-body" rows="6" placeholder="Текст..." class="w-full bg-darker border border-white/10 rounded-lg p-4 font-mono text-sm text-gray-300 outline-none"></textarea>
                    <button onclick="app.addNews()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold text-white">Опубликовать</button>
                </div>
            </div>
        </section>

    </main>

    <!-- MOBILE TAB BAR -->
    <nav class="md:hidden tab-bar safe-bottom z-50 flex justify-around items-center h-[64px] shrink-0">
        <button onclick="app.nav('feed')" class="flex flex-col items-center gap-1 w-full py-2 text-accent transition" id="tab-feed">
            <i class="fas fa-newspaper text-lg"></i><span class="text-[10px] font-medium">Лента</span>
        </button>
        <button onclick="app.nav('essence')" class="flex flex-col items-center gap-1 w-full py-2 text-gray-500 transition" id="tab-essence">
            <i class="fas fa-bolt text-lg"></i><span class="text-[10px] font-medium">Суть</span>
        </button>
        <button onclick="app.nav('ideas')" class="flex flex-col items-center gap-1 w-full py-2 text-gray-500 transition" id="tab-ideas">
            <i class="fas fa-lightbulb text-lg"></i><span class="text-[10px] font-medium">Мнения</span>
        </button>
    </nav>

    <!-- READER MODAL -->
    <div id="reader-modal" class="modal-overlay">
        <div id="reader-paper" class="reader-box reader-paper light">
            <div class="reader-header sticky top-0 z-10 px-6 py-3 flex justify-between items-center font-sans backdrop-blur">
                <button onclick="app.closeReader()" class="flex items-center gap-2 text-current opacity-70 hover:opacity-100 font-bold text-sm"><i class="fas fa-arrow-left"></i> Назад</button>
                <button onclick="app.toggleReaderTheme()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-black/5 dark:hover:bg-white/10 transition"><i id="theme-icon" class="fas fa-moon text-xs"></i></button>
            </div>
            <article id="reader-content" class="prose-reader"></article>
            <div class="max-w-[68ch] mx-auto px-6 pb-20 font-sans border-t border-current/10 mt-8 pt-8">
                <div class="flex gap-3 mb-8">
                    <button id="reader-like-btn" onclick="app.handleReaderLike()" class="reader-btn flex-1 py-3 rounded-xl font-bold border flex items-center justify-center gap-2 transition active:scale-95"><i class="far fa-heart"></i> <span id="reader-like-count">0</span></button>
                    <button onclick="app.handleReaderShare()" class="reader-btn flex-1 py-3 rounded-xl font-bold bg-accent text-white border-transparent flex items-center justify-center gap-2 transition active:scale-95"><i class="fas fa-share-alt"></i> Поделиться</button>
                </div>
                <a id="reader-source-link" href="#" target="_blank" class="block w-full py-3 mb-8 rounded-xl font-bold text-center bg-black text-white dark:bg-white dark:text-black no-underline hidden">Перейти к источнику</a>
                
                <h3 class="text-lg font-bold mb-4">Комментарии (<span id="comments-count">0</span>)</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="comment-nick" class="comment-input flex-1 px-4 py-3 rounded-xl border outline-none text-sm font-bold w-1/3" placeholder="Ник">
                    <input type="text" id="comment-input" class="comment-input flex-1 px-4 py-3 rounded-xl border outline-none text-sm" placeholder="Комментарий...">
                    <button onclick="app.postComment()" class="bg-accent text-white w-12 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
                </div>
                <div id="comments-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
const app = {
    data: { 
        news: [], posts: [], essenceFeed: [], 
        feedPage: 0, essencePage: 0, 
        feedLoading: false, essenceLoading: false, 
        readerTheme: localStorage.getItem('ip_theme') || 'light',
        likes: JSON.parse(localStorage.getItem('ip_likes_v7') || '{}'),
        comments: JSON.parse(localStorage.getItem('ip_comments_v7') || '{}'),
        userNick: localStorage.getItem('ip_nick') || '',
        currentItem: null, rssSources: []
    },

    init() {
        this.generateRSSSources();
        this.seedData();
        
        const savedPosts = localStorage.getItem('ip_posts_v7');
        this.data.posts = savedPosts ? JSON.parse(savedPosts) : [
            { id: 101, title: "Почему я покупаю нефтянку", body: "Энергетический кризис только начинается.", full: "<p>Многие боятся рецессии, но я вижу точку входа.</p><h2>Причины</h2><p>Дефицит инвестиций в добычу создает предпосылки для роста цен.</p>", tag: "Мнение", date: "2ч назад", isPost: true }
        ];

        if(this.data.userNick) document.getElementById('comment-nick').value = this.data.userNick;
        
        // Проверка онбординга
        if (!localStorage.getItem('ip_essence_seen')) {
            // Показываем только если пользователь сам зашел, но для демо покажем сразу при первой загрузке сути
        }

        this.initTicker();
        this.renderIdeas();
        this.renderStandardFeed(this.data.news.slice(0, 10));
        this.renderEssenceChunk(this.data.essenceFeed.slice(0, 5));
        
        // Listeners
        document.getElementById('view-feed').addEventListener('scroll', () => this.checkStandardScroll());
        ['mobile', 'desktop'].forEach(dev => {
            document.getElementById(`essence-${dev}`).addEventListener('scroll', () => this.checkEssenceScroll(dev));
        });

        // Nav default
        this.nav('feed');
    },

    seedData() {
        this.data.news = [
            { id: 's1', title: "Сбербанк: рекордная прибыль", body: "Чистая прибыль превысила 400 млрд руб.", full: "<p>Сбербанк опубликовал сильную отчетность.</p><h2>Детали</h2><p>Маржа выросла до 5.8%.</p>", tag: "Акции", source: "РБК", date: "1ч", sourceUrl: "https://rbc.ru" },
            { id: 's2', title: "Биткоин > $70,000", body: "Крипта обновила максимум.", full: "<p>Рынок ликует на фоне ETF.</p>", tag: "Крипто", source: "Bloomberg", date: "3ч", sourceUrl: "https://bloomberg.com" },
            { id: 's3', title: "ЦБ держит ставку", body: "Жесткая риторика сохраняется.", full: "<p>Набиуллина предупредила о рисках.</p>", tag: "Макро", source: "Интерфакс", date: "5ч", sourceUrl: "https://interfax.ru" },
            { id: 's4', title: "Газпром: новый НПЗ", body: "Инвестиции 300 млрд.", full: "<p>Увеличение переработки.</p>", tag: "Сырье", source: "Ведомости", date: "6ч", sourceUrl: "https://vedomosti.ru" },
            { id: 's5', title: "Яндекс GPT 5", body: "Лучше чем GPT-4?", full: "<p>Ставка на мультимодальность.</p>", tag: "IT", source: "Habr", date: "7ч", sourceUrl: "https://habr.com" }
        ];
        
        this.data.essenceFeed = [
            { id: 'e1', title: "ЦБ сохранил ставку 16%", summary: "• Ставка без изменений\n• Инфляция замедляется медленно\n• Жесткая политика продлится до конца года", tag: "Макро", source: "ЦБ РФ", date: "10:30", sourceUrl: "https://cbr.ru" },
            { id: 'e2', title: "Лукойл: дивиденды", summary: "• Рекомендация: 520 руб. на акцию\n• Отсечка: 15 мая\n• Доходность: ~14% годовых", tag: "Дивиденды", source: "Интерфакс", date: "09:15", sourceUrl: "https://interfax.ru" },
            { id: 'e3', title: "Илон Маск про AI", summary: "• Новый чип быстрее H100 в 2 раза\n• Акции NVDA +5% на новостях\n• Релиз FSD v13 перенесен", tag: "Tech", source: "Twitter", date: "Вчера", sourceUrl: "https://twitter.com" }
        ];
    },

    generateRSSSources() {
        const q = ['SBER','GAZP','LKOH','YNDX','VTBR','ROSN','GMKN','PLZL','MGNT','TCSG','нефть','газ','золото','банки','крипта','биткоин','дивиденды','IPO','ставка','инфляция'];
        this.data.rssSources = q.map(k => `https://news.google.com/rss/search?q=${k}+инвестиции&hl=ru&gl=RU&ceid=RU:ru`).sort(() => Math.random() - 0.5);
    },

    initTicker() {
        const d = [{n:'IMOEX',v:'3,245',c:'+1.2%',u:1},{n:'S&P',v:'5,432',c:'-0.4%',u:0},{n:'BTC',v:'68K',c:'+2.1%',u:1},{n:'Brent',v:'82',c:'-1.1%',u:0},{n:'USD',v:'92.5',c:'+0.3%',u:1}];
        document.getElementById('ticker-content').innerHTML = d.map(i=>`<div class="ticker-item"><span class="font-bold text-gray-300">${i.n}</span> <span class="mx-1">${i.v}</span> <span class="${i.u?'text-up':'text-down'}">${i.c}</span></div>`).join('').repeat(6);
    },

    nav(view) {
        this.data.currentView = view;
        document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${view}`).classList.remove('hidden');
        
        // Desktop Nav
        ['feed', 'essence', 'ideas'].forEach(v => {
            const btn = document.getElementById(`btn-${v}`);
            if(v === view) {
                if(v === 'essence') { btn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-bold bg-essence text-black shadow-lg shadow-orange-500/20 transition-all'; }
                else { btn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-bold bg-accent text-white shadow-lg shadow-accent/25 transition-all'; }
            } else {
                btn.className = 'nav-btn px-4 py-1.5 rounded-full text-xs font-medium text-gray-400 hover:text-white hover:bg-white/10 transition-all';
            }
        });

        // Mobile Tab Bar
        ['feed', 'essence', 'ideas'].forEach(v => {
            const tab = document.getElementById(`tab-${v}`);
            const color = v === 'essence' ? 'text-essence' : 'text-accent';
            if(v === view) { tab.classList.remove('text-gray-500'); tab.classList.add(color); }
            else { tab.classList.remove(color); tab.classList.add('text-gray-500'); }
        });

        // Onboarding check for Essence
        if(view === 'essence' && !localStorage.getItem('ip_essence_seen')) {
            document.getElementById('essence-modal').classList.add('active');
        }
    },

    closeEssenceModal() {
        document.getElementById('essence-modal').classList.remove('active');
        localStorage.setItem('ip_essence_seen', 'true');
    },

    showEssenceInfo() {
        document.getElementById('essence-modal').classList.add('active');
    },

    showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); },

    toggleLike(btn, id) {
        if (!id) return;
        const isLiked = this.data.likes[id];
        if (isLiked) { delete this.data.likes[id]; btn.classList.remove('text-ios-red'); btn.querySelector('i').classList.replace('fas', 'far'); } 
        else { this.data.likes[id] = true; btn.classList.add('text-ios-red'); btn.querySelector('i').classList.replace('far', 'fas'); btn.querySelector('i').classList.add('like-animate'); setTimeout(() => btn.querySelector('i').classList.remove('like-animate'), 300); }
        localStorage.setItem('ip_likes_v7', JSON.stringify(this.data.likes));
        this.updateLikeUI(id);
    },

    updateLikeUI(id) {
        const isLiked = this.data.likes[id];
        const base = Math.abs(String(id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % 150;
        const total = isLiked ? base + 1 : base;
        const c = document.getElementById('reader-like-count'); if(c) c.innerText = total;
        const b = document.getElementById('reader-like-btn'); 
        if(b) { if(isLiked) { b.classList.add('text-ios-red'); b.querySelector('i').className='fas fa-heart'; } else { b.classList.remove('text-ios-red'); b.querySelector('i').className='far fa-heart'; } }
    },

    handleReaderLike() { if(this.data.currentItem) this.toggleLike(document.getElementById('reader-like-btn'), this.data.currentItem.id); },
    handleReaderShare() { if(this.data.currentItem) { try{navigator.share({title:this.data.currentItem.title, url:location.href})}catch(e){navigator.clipboard.writeText(location.href); this.showToast('Скопировано')} } },

    postComment() {
        if(!this.data.currentItem) return;
        const nick = document.getElementById('comment-nick').value.trim() || 'Аноним';
        const text = document.getElementById('comment-input').value.trim();
        if(!text) return;
        localStorage.setItem('ip_nick', nick);
        const id = this.data.currentItem.id;
        if(!this.data.comments[id]) this.data.comments[id] = [];
        this.data.comments[id].unshift({text, author: nick, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})});
        localStorage.setItem('ip_comments_v7', JSON.stringify(this.data.comments));
        document.getElementById('comment-input').value = '';
        this.renderComments(id);
        this.showToast('Отправлено');
    },

    renderComments(id) {
        const list = document.getElementById('comments-list');
        const count = document.getElementById('comments-count');
        const coms = this.data.comments[id] || [];
        count.innerText = coms.length;
        list.innerHTML = coms.map(c => `<div class="bg-black/5 dark:bg-white/5 p-3 rounded-xl"><div class="flex justify-between text-xs font-bold mb-1 opacity-70"><span>${c.author}</span><span>${c.date}</span></div><p class="text-sm">${c.text}</p></div>`).join('');
    },

    openReader(id, isEssence = false) {
        const item = isEssence 
            ? this.data.essenceFeed.find(i => i.id == id) 
            : [...this.data.news, ...this.data.posts].find(i => i.id == id);
            
        if(!item) return;
        this.data.currentItem = item;
        
        const modal = document.getElementById('reader-modal');
        const paper = document.getElementById('reader-paper');
        const content = document.getElementById('reader-content');
        const srcLink = document.getElementById('reader-source-link');

        if(this.data.readerTheme === 'dark') { paper.classList.add('dark'); paper.classList.remove('light'); }
        else { paper.classList.add('light'); paper.classList.remove('dark'); }
        
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        
        if(item.sourceUrl) { srcLink.href = item.sourceUrl; srcLink.classList.remove('hidden'); } else { srcLink.classList.add('hidden'); }

        let bodyHtml = item.full || item.body;
        if (isEssence && item.summary) {
            bodyHtml = `<div class="bg-black/5 dark:bg-white/5 p-6 rounded-2xl mb-8 border-l-4 border-essence"><h3 class="font-bold text-lg mb-3 flex items-center gap-2 font-sans"><i class="fas fa-bolt text-essence"></i> Главное</h3><p class="whitespace-pre-line font-medium">${item.summary}</p></div>` + bodyHtml;
        }

        content.innerHTML = `
            <div class="font-sans text-xs opacity-50 uppercase tracking-widest mb-6 flex items-center gap-3">
                <span class="bg-black/5 dark:bg-white/10 px-2 py-1 rounded font-bold">${item.tag}</span>
                <span>${item.source} • ${item.date}</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-black mb-8 leading-tight font-sans tracking-tight">${item.title}</h1>
            <div class="mb-10">${bodyHtml}</div>
        `;
        
        this.updateLikeUI(id);
        this.renderComments(id);
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    },

    closeReader() {
        document.getElementById('reader-modal').classList.remove('active');
        document.body.style.overflow = '';
        this.data.currentItem = null;
    },

    toggleReaderTheme() {
        this.data.readerTheme = this.data.readerTheme === 'light' ? 'dark' : 'light';
        const paper = document.getElementById('reader-paper');
        if(this.data.readerTheme === 'dark') { paper.classList.add('dark'); paper.classList.remove('light'); }
        else { paper.classList.add('light'); paper.classList.remove('dark'); }
        document.getElementById('theme-icon').className = this.data.readerTheme === 'light' ? 'fas fa-moon text-xs' : 'fas fa-sun text-xs';
        localStorage.setItem('ip_theme', this.data.readerTheme);
    },

    // --- STANDARD FEED LOGIC ---
    checkStandardScroll() {
        if (this.data.currentView !== 'feed' || this.data.feedLoading) return;
        const el = document.getElementById('view-feed');
        if (el.scrollTop + el.clientHeight >= el.scrollHeight - 300) this.loadMoreStandard();
    },

    async loadMoreStandard() {
        if(this.data.feedLoading) return;
        this.data.feedLoading = true;
        document.getElementById('feed-loader').classList.remove('hidden');
        // Симуляция загрузки RSS
        setTimeout(() => {
            const newItems = [
                { id: 'gen_'+Date.now(), title: "Отчетность Газпрома", body: "Чистая прибыль упала на 40%. Дивидендов не будет.", full: "<p>Подробности отчета...</p>", tag: "Акции", source: "Ведомости", date: "Сегодня", sourceUrl: "#" },
                { id: 'gen_'+(Date.now()+1), title: "ФРС США: протокол", body: "Снижение ставки в июне маловероятно.", full: "<p>Анализ протокола...</p>", tag: "Макро", source: "Reuters", date: "Вчера", sourceUrl: "#" }
            ];
            this.data.news = [...this.data.news, ...newItems];
            this.renderStandardFeed(newItems);
            this.data.feedLoading = false;
            document.getElementById('feed-loader').classList.add('hidden');
        }, 1000);
    },

    renderStandardFeed(items) {
        const container = document.getElementById('standard-feed-container');
        const html = items.map(n => `
            <div onclick="app.openReader('${n.id}')" class="bg-card/50 hover:bg-card border border-white/5 hover:border-accent/30 rounded-xl p-5 cursor-pointer transition-all group">
                <div class="flex justify-between mb-2"><span class="text-xs font-bold text-accent bg-accent/10 px-2 py-1 rounded">${n.tag}</span><span class="text-xs text-gray-500">${n.date}</span></div>
                <h3 class="text-lg font-bold text-white group-hover:text-accent transition mb-2">${n.title}</h3>
                <p class="text-sm text-gray-400 line-clamp-2">${n.body}</p>
            </div>
        `).join('');
        container.insertAdjacentHTML('beforeend', html);
    },

    // --- ESSENCE FEED LOGIC ---
    checkEssenceScroll(device) {
        if (this.data.currentView !== 'essence' || this.data.essenceLoading) return;
        const el = document.getElementById(`essence-${device}`);
        const isEnd = device === 'mobile' 
            ? el.scrollLeft + el.clientWidth >= el.scrollWidth - 300
            : el.scrollTop + el.clientHeight >= el.scrollHeight - 300;
        if (isEnd) this.loadMoreEssence();
    },

    async loadMoreEssence() {
        if(this.data.essenceLoading) return;
        this.data.essenceLoading = true;
        document.getElementById('essence-loader').classList.remove('hidden');
        setTimeout(() => {
            const newItems = [
                { id: 'eg_'+Date.now(), title: "Золото обновляет максимум", summary: "• Цена > $2400\n• Центробанки скупают\n• Хеджирование рисков", tag: "Сырье", source: "Bloomberg", date: "Сегодня", sourceUrl: "#" },
                { id: 'eg_'+(Date.now()+1), title: "IPO Самолет", summary: "• Диапазон: 3200-3600 руб\n• Оценка: 120 млрд руб\n• Дивиденды от 10%", tag: "IPO", source: "МОСКВА", date: "Вчера", sourceUrl: "#" }
            ];
            this.data.essenceFeed = [...this.data.essenceFeed, ...newItems];
            this.renderEssenceChunk(newItems);
            this.data.essenceLoading = false;
            document.getElementById('essence-loader').classList.add('hidden');
        }, 1200);
    },

    renderEssenceChunk(items) {
        const mContainer = document.getElementById('essence-mobile');
        const dContainer = document.getElementById('essence-desktop');
        const grads = ['from-orange-900 to-black', 'from-amber-900 to-black', 'from-yellow-900 to-black'];
        
        const html = items.map(i => {
            const liked = this.data.likes[i.id];
            const g = grads[Math.abs(String(i.id).split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % grads.length];
            
            const inner = `
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent pointer-events-none z-10"></div>
                <div class="absolute top-4 right-4 flex gap-2 z-20">
                    <button onclick="event.stopPropagation(); app.toggleLike(this, '${i.id}')" class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center ${liked?'text-ios-red':'text-white/80'} transition active:scale-90 border border-white/10"><i class="${liked?'fas':'far'} fa-heart"></i></button>
                </div>
                <div class="relative z-20 h-full flex flex-col justify-end p-6 cursor-pointer" onclick="app.openReader('${i.id}', true)">
                    <div class="flex items-center gap-2 mb-3"><span class="px-2 py-0.5 rounded bg-essence/20 backdrop-blur text-[10px] font-bold text-essence uppercase tracking-wide border border-essence/30">#${i.tag}</span><span class="text-white/60 text-xs font-medium">${i.date}</span></div>
                    <h2 class="text-2xl font-bold text-white leading-tight mb-3 drop-shadow-md">${i.title}</h2>
                    
                    <div class="bg-black/40 backdrop-blur-sm p-4 rounded-xl border border-white/10 mb-4">
                        <div class="text-essence text-xs font-bold uppercase mb-2 flex items-center gap-1"><i class="fas fa-bolt"></i> Выжимка</div>
                        <p class="text-sm text-gray-200 whitespace-pre-line leading-snug">${i.summary}</p>
                    </div>

                    <div class="mt-auto">
                        <a href="${i.sourceUrl}" target="_blank" onclick="event.stopPropagation()" class="block w-full py-3 rounded-xl font-bold text-center text-sm bg-essence text-black hover:bg-orange-400 transition active:scale-95 no-underline">Читать источник <i class="fas fa-external-link-alt ml-2 text-xs"></i></a>
                    </div>
                </div>
            `;

            const mCard = `<div class="essence-card-mobile bg-gradient-to-br ${g} shadow-2xl border border-white/5 group">${inner}</div>`;
            const dCard = `<div class="essence-card-desktop bg-gradient-to-br ${g} shadow-xl border border-white/5 group hover:shadow-2xl hover:border-white/20">${inner}</div>`;

            return { mCard, dCard };
        });

        mContainer.insertAdjacentHTML('beforeend', html.map(h => h.mCard).join(''));
        dContainer.insertAdjacentHTML('beforeend', html.map(h => h.dCard).join(''));
    },

    toggleAdmin() { this.nav('admin'); },
    login() { if(document.getElementById('adm-pass').value==='admin') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-editor').classList.remove('hidden'); } else alert('Неверно'); },
    addNews() {
        const t=document.getElementById('new-title').value, b=document.getElementById('new-body').value, type=document.getElementById('new-tag').value;
        if(!t||!b) return alert('Заполните');
        const n={id:Date.now(), title:t, body:b.substring(0,150)+'...', full:`<p>${b.replace(/\n/g,'</p><p>')}</p>`, tag:type==='idea'?'Мнение':'Новости', source:'Автор', date:'Сейчас', isPost:type==='idea', sourceUrl:'#'};
        if(type==='idea') { this.data.posts.unshift(n); localStorage.setItem('ip_posts_v7',JSON.stringify(this.data.posts)); this.renderIdeas(); }
        else { this.data.news.unshift(n); this.renderStandardFeed([n]); }
        alert('OK'); this.nav(type==='idea'?'ideas':'feed');
    },
    renderIdeas() { 
        document.getElementById('ideas-list').innerHTML = this.data.posts.map(p => `
            <div onclick="app.openReader('${p.id}')" class="bg-card p-6 rounded-2xl border border-white/5 active:scale-95 transition cursor-pointer hover:border-purple-500/50 group">
                <div class="text-xs text-purple-400 font-bold mb-3 uppercase tracking-wider flex items-center gap-2"><i class="fas fa-pen-nib"></i> Мнение • ${p.date}</div>
                <h3 class="text-xl font-bold mb-3 group-hover:text-purple-400 transition">${p.title}</h3>
                <p class="text-sm text-gray-400 line-clamp-3 leading-relaxed">${p.body}</p>
            </div>
        `).join(''); 
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
